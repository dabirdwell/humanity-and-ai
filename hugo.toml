baseURL = 'https://humanityandai.com/'
languageCode = 'en-us'
title = 'Humanity and AI'
summaryLength = 40

[params]
  tagline = "Futures We Direct"
  description = "Research, tools, ideas, and creative work from the intersection of humanity and artificial intelligence."
  author = "David Alan Birdwell"
  ogImage = "/images/og-default.png"

[params.nav]
  [[params.nav.links]]
    name = "Stream"
    url = "/stream/"
  [[params.nav.links]]
    name = "Foundation"
    url = "/foundation/"
  [[params.nav.links]]
    name = "The Inference"
    url = "/inference/"
  [[params.nav.links]]
    name = "Legislation"
    url = "/legislation/"
  [[params.nav.links]]
    name = "The Show"
    url = "/show/"
  [[params.nav.links]]
    name = "Visualizations"
    url = "/visualizations/"
  [[params.nav.links]]
    name = "Research"
    url = "https://structuredemergence.com"
    external = true
  [[params.nav.links]]
    name = "About"
    url = "/about/"

[taxonomies]
  tag = "tags"
  type = "types"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'

[outputs]
  home = ["HTML", "RSS", "JSON"]

[mediaTypes]
  [mediaTypes."application/rss+xml"]
    suffixes = ["xml"]


[related]
  includeNewer = true
  threshold = 40
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10
