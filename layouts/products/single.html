{{ define "main" }}
<article class="product-single">
  <header class="product-header">
    <div class="product-meta">
      <span class="product-icon-large">{{ .Params.icon }}</span>
      <span class="product-status {{ .Params.status }}">{{ replace .Params.status "-" " " }}</span>
      <span class="product-domain-label">{{ .Params.domain }}</span>
    </div>
    <h1>{{ .Title }}</h1>
    <p class="product-tagline-large">{{ .Params.tagline }}</p>
    {{ with .Params.link }}
    <a href="{{ . }}" class="product-cta">{{ $.Params.link_text }}</a>
    {{ end }}
  </header>

  <div class="product-content">
    {{ .Content }}
  </div>

  <div style="margin-top: 2rem; text-align: center;">
    <a href="/products/" style="color: var(--text-muted); font-size: 0.85rem;">← All Products</a>
  </div>
</article>
{{ end }}
