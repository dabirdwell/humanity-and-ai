{{ define "main" }}
<div class="products-landing">
  <header class="products-hero">
    <p class="products-eyebrow">Brain Mastery</p>
    <h1>Software that thinks the way you do.</h1>
    <p class="products-hero-desc">{{ .Content }}</p>
  </header>

  <div class="products-grid">
    {{ range .Pages.ByWeight }}
    <a href="{{ .Permalink }}" class="product-card">
      <div class="product-card-header">
        <span class="product-icon">{{ .Params.icon }}</span>
        <span class="product-status {{ .Params.status }}">{{ replace .Params.status "-" " " }}</span>
      </div>
      <h3>{{ .Title }}</h3>
      <p class="product-domain">{{ .Params.domain }}</p>
      <p class="product-tagline">{{ .Params.tagline }}</p>
      <span class="product-link">{{ .Params.link_text }}</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
