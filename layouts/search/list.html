{{ define "head" }}
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0" defer></script>
{{ end }}

{{ define "main" }}
<div class="search-page">
  <div class="search-header">
    <h1>Search</h1>
    <div class="search-input-wrap">
      <svg class="search-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchInput" class="search-input" placeholder="Search articles, essays, tools…" autocomplete="off" autofocus>
      <kbd class="search-kbd" id="searchKbd">/</kbd>
    </div>
    <p class="search-hint" id="searchHint">Type to search across all content</p>
  </div>
  <div class="search-results" id="searchResults" role="listbox" aria-label="Search results"></div>
</div>

<script>
(function() {
  var input = document.getElementById('searchInput');
  var resultsEl = document.getElementById('searchResults');
  var hint = document.getElementById('searchHint');
  var kbd = document.getElementById('searchKbd');
  var fuse = null;
  var activeIdx = -1;
  var results = [];

  // Load index
  fetch('/index.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      fuse = new Fuse(data, {
        keys: [
          { name: 'title', weight: 0.4 },
          { name: 'content', weight: 0.3 },
          { name: 'summary', weight: 0.2 },
          { name: 'tags', weight: 0.1 }
        ],
        threshold: 0.35,
        ignoreLocation: true,
        minMatchCharLength: 2
      });
      // Check URL param
      var params = new URLSearchParams(window.location.search);
      var q = params.get('q');
      if (q) { input.value = q; doSearch(q); }
    });

  // Debounce
  var timer;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    var q = input.value.trim();
    timer = setTimeout(function() { doSearch(q); }, 150);
  });

  function doSearch(q) {
    activeIdx = -1;
    if (!fuse || q.length < 2) {
      resultsEl.innerHTML = '';
      hint.textContent = q.length === 0 ? 'Type to search across all content' : 'Keep typing…';
      hint.style.display = '';
      return;
    }
    results = fuse.search(q, { limit: 30 });
    if (results.length === 0) {
      resultsEl.innerHTML = '';
      hint.textContent = 'No results for "' + q + '"';
      hint.style.display = '';
      return;
    }
    hint.style.display = 'none';
    resultsEl.innerHTML = results.map(function(r, i) {
      var item = r.item;
      var section = item.section ? '<span class="search-result-section">' + item.section + '</span>' : '';
      var date = item.date ? '<span class="search-result-date">' + item.date + '</span>' : '';
      var tags = '';
      if (item.tags && item.tags.length) {
        tags = '<div class="search-result-tags">' + item.tags.map(function(t) { return '<span>#' + t + '</span>'; }).join('') + '</div>';
      }
      return '<a href="' + item.relpermalink + '" class="search-result" role="option" id="sr-' + i + '">'
        + '<div class="search-result-meta">' + section + date + '</div>'
        + '<h3 class="search-result-title">' + item.title + '</h3>'
        + '<p class="search-result-excerpt">' + item.summary + '</p>'
        + tags
        + '</a>';
    }).join('');
  }

  // Keyboard navigation
  input.addEventListener('keydown', function(e) {
    var items = resultsEl.querySelectorAll('.search-result');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      updateActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, -1);
      updateActive(items);
    } else if (e.key === 'Enter' && activeIdx >= 0) {
      e.preventDefault();
      items[activeIdx].click();
    }
  });

  function updateActive(items) {
    items.forEach(function(el, i) {
      el.classList.toggle('active', i === activeIdx);
      if (i === activeIdx) {
        el.scrollIntoView({ block: 'nearest' });
        input.setAttribute('aria-activedescendant', 'sr-' + i);
      }
    });
    if (activeIdx < 0) input.removeAttribute('aria-activedescendant');
  }

  // Global "/" shortcut to focus search
  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== input && !e.ctrlKey && !e.metaKey) {
      var tag = (document.activeElement || {}).tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      e.preventDefault();
      input.focus();
      input.select();
    }
    if (e.key === 'Escape' && document.activeElement === input) {
      input.blur();
    }
  });

  // Hide kbd hint when focused
  input.addEventListener('focus', function() { kbd.style.display = 'none'; });
  input.addEventListener('blur', function() { if (!input.value) kbd.style.display = ''; });
})();
</script>
{{ end }}
