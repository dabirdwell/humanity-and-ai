{{ define "main" }}
<div class="fk-page">

  <!-- HERO -->
  <section class="fk-hero">
    <div class="fk-hero-inner">
      <p class="fk-eyebrow">Foundation · For Kids</p>
      <h1 class="fk-title">{{ .Title }}</h1>
      <p class="fk-subtitle">{{ .Params.description }}</p>
    </div>
  </section>

  <!-- CONTENT -->
  <section class="fk-content">
    <div class="fk-content-inner">
      {{ .Content }}
    </div>
  </section>

  <!-- CTA -->
  <section class="fk-cta">
    <div class="fk-cta-inner">
      <a href="/foundation/" class="fk-cta-btn primary">Read the full Foundation framework &rarr;</a>
    </div>
  </section>

</div>


<style>
:root {
  --fk-teal: #4ecdc4;
  --fk-orange: #ff6b35;
  --fk-bg: #0a0a0f;
  --fk-bg2: #12121a;
  --fk-bg3: #16161f;
  --fk-text: #e8e8ed;
  --fk-muted: #9898a8;
  --fk-dim: #58586a;
  --fk-border: rgba(255,255,255,0.07);
}

.fk-page { background: var(--fk-bg); color: var(--fk-text); }

.fk-hero {
  padding: 80px 24px 60px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(78,205,196,.08) 0%, transparent 70%);
  text-align: center;
}
.fk-hero-inner { max-width: 680px; margin: 0 auto; }
.fk-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: var(--fk-teal); margin-bottom: 20px;
}
.fk-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 700; line-height: 1.15; color: #fff; margin-bottom: 24px;
}
.fk-subtitle {
  font-size: clamp(1rem, 2.5vw, 1.15rem);
  color: var(--fk-muted); line-height: 1.75; margin: 0;
}

.fk-content { max-width: 720px; margin: 0 auto; padding: 56px 24px 40px; }
.fk-content-inner p {
  font-size: 1.05rem; color: var(--fk-muted); line-height: 1.8; margin-bottom: 1em;
}
.fk-content-inner > p:first-child {
  font-size: 1.15rem; color: var(--fk-text); font-weight: 500; line-height: 1.7;
}
.fk-content-inner hr {
  border: none; border-top: 1px solid var(--fk-border); margin: 2em 0;
}
.fk-content-inner strong {
  color: #fff; font-weight: 600;
}
.fk-content-inner h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.3rem, 3vw, 1.7rem);
  font-weight: 700; color: #fff; margin: 2em 0 0.8em; line-height: 1.3;
}
.fk-content-inner a {
  color: var(--fk-teal); text-decoration: none; border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.fk-content-inner a:hover { border-bottom-color: var(--fk-teal); }

.fk-cta { padding: 0 24px 80px; text-align: center; }
.fk-cta-inner { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.fk-cta-btn {
  display: inline-block; padding: 13px 28px;
  border-radius: 8px; font-size: 14px; font-weight: 500;
  text-decoration: none; transition: all .2s;
}
.fk-cta-btn.primary { background: var(--fk-teal); color: #0a0a0f; }
.fk-cta-btn.primary:hover { background: #6eddd8; transform: translateY(-2px); }

@media (max-width: 600px) {
  .fk-hero { padding: 56px 16px 40px; }
  .fk-content { padding: 40px 16px 24px; }
  .fk-cta { padding: 0 16px 56px; }
}
</style>
{{ end }}
