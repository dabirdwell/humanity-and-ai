  <text x="80" y="582" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#94a3b8" opacity="0.7">humanityandai.com</text>

  <!-- Type badge (right side) -->
  <text x="1120" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#14b8a6" text-anchor="end" letter-spacing="1.5" opacity="0.8">FOUNDATION</text>
