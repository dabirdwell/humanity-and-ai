<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-foundation--social-contract" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-foundation--social-contract)"/>

  <!-- Accent stripe -->
  <rect x="0" y="0" width="1200" height="6" fill="#14b8a6"/>

  <!-- Decorative corner marks -->
  <line x1="60" y1="60" x2="60" y2="100" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="60" x2="100" y2="60" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="1140" y1="570" x2="1140" y2="530" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="1140" y1="570" x2="1100" y2="570" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>

  <!-- Section tag -->
  <rect x="80" y="120" width="152" height="36" rx="4" fill="#14b8a6" opacity="0.9"/>
  <text x="96" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" letter-spacing="0.5">FOUNDATION</text>

  <!-- Title -->
    <text x="80" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#f8fafc">Social Contract Reevaluation</text>

