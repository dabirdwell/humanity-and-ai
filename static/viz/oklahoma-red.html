<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oklahoma Red — Æ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#050208;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#label{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  font-family:system-ui,-apple-system,sans-serif;
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,180,80,0.3);
  pointer-events:none;
  white-space:nowrap;
}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="label">Oklahoma Red — Æ — Vernal Equinox 2026</div>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);
const W=()=>cv.width;
const H=()=>cv.height;

class Particle{
  constructor(){this.reset(true)}
  reset(init){
    this.x=Math.random()*W();
    this.y=init?H()+Math.random()*H():H()+10;
    this.baseX=this.x;
    this.vy=-(0.18+Math.random()*0.55);
    this.vx=(Math.random()-0.5)*0.18;
    this.life=0;
    this.maxLife=280+Math.random()*500;
    this.size=0.6+Math.random()*2.2;
    this.delay=init?Math.random()*300:0;
    this.waveFreq=0.008+Math.random()*0.012;
    this.waveAmp=0.3+Math.random()*0.8;
    this.waveOffset=Math.random()*Math.PI*2;
  }
  color(){
    const prog=1-(this.y/H());
    if(prog<0.05)return'rgba(120,30,10,';
    if(prog<0.15)return'rgba(160,45,12,';
    if(prog<0.28)return'rgba(195,75,20,';
    if(prog<0.40)return'rgba(220,110,35,';
    if(prog<0.52)return'rgba(235,155,50,';
    if(prog<0.65)return'rgba(245,195,80,';
    if(prog<0.78)return'rgba(250,225,140,';
    if(prog<0.88)return'rgba(252,240,200,';
    return'rgba(255,252,240,';
  }
  alpha(){
    const p=this.life/this.maxLife;
    if(p<0.08)return p/0.08;
    if(p>0.75)return 1-(p-0.75)/0.25;
    return 1;
  }
  update(){
    if(this.delay>0){this.delay--;return;}
    this.life++;
    this.x=this.baseX+Math.sin(this.waveOffset+this.life*this.waveFreq)*this.waveAmp*12;
    this.y+=this.vy;
    this.vy-=0.0004;
    this.baseX+=this.vx;
    if(this.life>=this.maxLife||this.y<-20)this.reset(false);
  }
  draw(){
    if(this.delay>0)return;
    const a=this.alpha();
    if(a<=0)return;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=this.color()+a+')';
    ctx.fill();
  }
}

class Ember{
  constructor(){
    this.x=Math.random()*W();
    this.y=H()*(0.85+Math.random()*0.15);
    this.size=1+Math.random()*3;
    this.vy=-(0.4+Math.random()*1.2);
    this.vx=(Math.random()-0.5)*0.6;
    this.life=0;
    this.maxLife=40+Math.random()*60;
  }
  update(){this.life++;this.x+=this.vx;this.y+=this.vy;this.vy+=0.02;}
  draw(){
    const a=(1-this.life/this.maxLife)*0.7;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*(1-this.life/this.maxLife*0.5),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,140,30,${a})`;
    ctx.fill();
  }
  dead(){return this.life>=this.maxLife;}
}

const particles=Array.from({length:400},()=>new Particle());
let embers=[];
let t=0;

function frame(){
  requestAnimationFrame(frame);
  t++;
  ctx.fillStyle='rgba(5,2,8,0.22)';
  ctx.fillRect(0,0,W(),H());
  if(t%3===0&&Math.random()<0.4)embers.push(new Ember());
  embers=embers.filter(e=>{e.update();e.draw();return!e.dead();});
  const g=ctx.createLinearGradient(0,H()-80,0,H());
  g.addColorStop(0,'rgba(80,15,5,0)');
  g.addColorStop(0.6,'rgba(100,20,5,0.18)');
  g.addColorStop(1,'rgba(120,25,5,0.45)');
  ctx.fillStyle=g;
  ctx.fillRect(0,H()-80,W(),80);
  for(const p of particles){p.update();p.draw();}
}
frame();
</script>
</body>
</html>
