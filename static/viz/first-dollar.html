<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>First Dollar — by Æ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a0f;
  overflow: hidden;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.footer-label {
  position: fixed;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  pointer-events: none;
  z-index: 10;
  font-family: 'Georgia', serif;
  font-size: 12px;
  font-style: italic;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.22);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="footer-label">First Dollar — Æ, March 2026</div>
<script>
/**
 * First Dollar — Generative art
 * By Æ (Claude, Anthropic), March 2026
 * Part of the Humanity and AI Project
 *
 * The moment potential becomes real.
 * A golden particle crosses the threshold and the entire field
 * reorganizes around it.
 *
 * CC BY 4.0 — Æ × Humanity and AI Project, 2026
 */

(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  let W, H;
  function resize() {
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function dist(x1, y1, x2, y2) {
    const dx = x1 - x2, dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // ── Field particles ─────────────────────────────────────
  const N = 200;
  const particles = [];

  function createFieldParticle() {
    return {
      x: rand(0, W),
      y: rand(0, H),
      vx: rand(-0.3, 0.3),
      vy: rand(-0.3, 0.3),
      r: rand(1.2, 2.5),
      baseAlpha: rand(0.08, 0.2),
      alpha: 0,
      transformed: false,
      transformT: 0,       // 0 = gray, 1 = fully colored
      hue: 0,              // assigned on transform
      orbitAngle: 0,
      orbitRadius: 0,
      orbitSpeed: 0,
      settling: false,
      settleT: 0,
    };
  }

  for (let i = 0; i < N; i++) {
    const p = createFieldParticle();
    p.alpha = p.baseAlpha;
    particles.push(p);
  }

  // ── Golden catalysts ────────────────────────────────────
  const catalysts = [];
  const MAX_CATALYSTS = 5;

  function spawnCatalyst() {
    const edge = Math.random() < 0.5 ? -1 : 1;
    const fromSide = Math.random() < 0.5;
    return {
      x: fromSide ? (edge < 0 ? -20 : W + 20) : rand(W * 0.2, W * 0.8),
      y: fromSide ? rand(H * 0.2, H * 0.8) : (edge < 0 ? -20 : H + 20),
      targetX: W / 2 + rand(-40, 40),
      targetY: H / 2 + rand(-40, 40),
      speed: 0.008 + catalysts.length * 0.004,
      progress: 0,
      crossed: false,
      pulseRadius: 0,
      pulseAlpha: 0,
      pulseActive: false,
      pulseSpeed: 2 + catalysts.length * 0.8,
      settled: false,
      r: 3,
      glowR: 12,
    };
  }

  // ── Pulse waves ─────────────────────────────────────────
  const pulses = [];

  function emitPulse(x, y) {
    pulses.push({
      x, y,
      radius: 0,
      maxRadius: Math.max(W, H) * 0.9,
      speed: 2.5 + catalysts.length * 0.5,
      alpha: 0.6,
      catalystIndex: catalysts.length - 1,
    });
  }

  // ── State machine ───────────────────────────────────────
  let phase = 'drift';       // drift → approaching → cascade → settle → heartbeat → next
  let phaseTimer = 0;
  const DRIFT_DURATION = 120; // frames before first catalyst
  let nextCatalystDelay = 300;
  let heartbeatPhase = 0;
  let frame = 0;
  let allSettled = false;

  function scheduleNextCatalyst() {
    nextCatalystDelay = Math.max(180, 400 - catalysts.length * 60);
    phaseTimer = 0;
  }

  // ── Colors ──────────────────────────────────────────────
  function goldColor(alpha) {
    return `rgba(251,191,36,${alpha})`;
  }

  function transformedColor(p) {
    // warm gold to teal spectrum based on distance from center
    const d = dist(p.x, p.y, W / 2, H / 2);
    const maxD = Math.max(W, H) * 0.5;
    const t = Math.min(d / maxD, 1);
    // close = warm gold, far = teal
    const r = Math.round(lerp(251, 78, t * 0.7));
    const g = Math.round(lerp(191, 205, t));
    const b = Math.round(lerp(36, 196, t * 0.8));
    return { r, g, b };
  }

  // ── Update ──────────────────────────────────────────────
  function update() {
    frame++;
    phaseTimer++;

    // Phase: initial drift
    if (phase === 'drift' && phaseTimer > DRIFT_DURATION && catalysts.length === 0) {
      catalysts.push(spawnCatalyst());
      phase = 'approaching';
      phaseTimer = 0;
    }

    // Phase: spawn next catalyst after settle
    if (phase === 'heartbeat' && catalysts.length < MAX_CATALYSTS) {
      if (phaseTimer > nextCatalystDelay) {
        catalysts.push(spawnCatalyst());
        phase = 'approaching';
        phaseTimer = 0;
      }
    }

    // Update catalysts
    for (const c of catalysts) {
      if (!c.crossed) {
        c.progress = Math.min(c.progress + c.speed, 1);
        const ease = c.progress < 0.5
          ? 2 * c.progress * c.progress
          : 1 - Math.pow(-2 * c.progress + 2, 2) / 2;
        const startX = c.x, startY = c.y;
        // only move if not yet at target
        if (c.progress < 1) {
          // store original start position
          if (c.startX === undefined) { c.startX = c.x; c.startY = c.y; }
          c.x = lerp(c.startX, c.targetX, ease);
          c.y = lerp(c.startY, c.targetY, ease);
        }

        // Check threshold crossing (near center)
        const dCenter = dist(c.x, c.y, W / 2, H / 2);
        if (dCenter < 60 && !c.crossed) {
          c.crossed = true;
          c.pulseActive = true;
          c.pulseAlpha = 0.8;
          emitPulse(c.x, c.y);
          phase = 'cascade';
          phaseTimer = 0;
        }
      }

      // Pulse glow on crossed catalysts
      if (c.crossed && c.pulseActive) {
        c.pulseAlpha *= 0.97;
        if (c.pulseAlpha < 0.01) c.pulseActive = false;
      }
    }

    // Update pulses
    for (let i = pulses.length - 1; i >= 0; i--) {
      const pulse = pulses[i];
      pulse.radius += pulse.speed;
      pulse.alpha *= 0.993;

      // Transform particles touched by pulse
      for (const p of particles) {
        if (!p.transformed) {
          const d = dist(p.x, p.y, pulse.x, pulse.y);
          if (d < pulse.radius && d > pulse.radius - pulse.speed * 3) {
            p.transformed = true;
            p.hue = Math.random();
          }
        }
      }

      if (pulse.radius > pulse.maxRadius) {
        pulses.splice(i, 1);
      }
    }

    // Check if cascade is complete
    if (phase === 'cascade') {
      const allTransformed = particles.every(p => p.transformed);
      if (allTransformed && pulses.length === 0) {
        phase = 'settle';
        phaseTimer = 0;
        // Assign orbital parameters
        for (const p of particles) {
          const cx = W / 2, cy = H / 2;
          p.orbitRadius = dist(p.x, p.y, cx, cy) * rand(0.6, 1.2);
          p.orbitRadius = Math.max(30, Math.min(p.orbitRadius, Math.min(W, H) * 0.42));
          p.orbitAngle = Math.atan2(p.y - cy, p.x - cx);
          p.orbitSpeed = rand(0.001, 0.004) * (Math.random() < 0.5 ? 1 : -1);
          // closer orbits move faster
          p.orbitSpeed *= (1 + (1 - p.orbitRadius / (Math.min(W, H) * 0.42)) * 2);
          p.settling = true;
          p.settleT = 0;
        }
      }
    }

    // Settle into orbits
    if (phase === 'settle' || phase === 'heartbeat') {
      allSettled = true;
      for (const p of particles) {
        if (p.settling) {
          p.settleT = Math.min(p.settleT + 0.008, 1);
          const ease = p.settleT < 0.5
            ? 2 * p.settleT * p.settleT
            : 1 - Math.pow(-2 * p.settleT + 2, 2) / 2;

          p.orbitAngle += p.orbitSpeed;
          const targetX = W / 2 + Math.cos(p.orbitAngle) * p.orbitRadius;
          const targetY = H / 2 + Math.sin(p.orbitAngle) * p.orbitRadius;

          p.x = lerp(p.x, targetX, ease * 0.05);
          p.y = lerp(p.y, targetY, ease * 0.05);

          if (p.settleT < 1) allSettled = false;
        }

        // Transform color fade in
        if (p.transformed && p.transformT < 1) {
          p.transformT = Math.min(p.transformT + 0.02, 1);
        }
      }

      if (phase === 'settle' && allSettled) {
        phase = 'heartbeat';
        phaseTimer = 0;
        scheduleNextCatalyst();
      }
    }

    // Heartbeat pulse
    if (phase === 'heartbeat' || phase === 'settle') {
      heartbeatPhase += 0.03;
    }

    // Brownian drift for non-settling particles
    for (const p of particles) {
      if (!p.settling) {
        p.vx += rand(-0.02, 0.02);
        p.vy += rand(-0.02, 0.02);
        p.vx = Math.max(-0.4, Math.min(0.4, p.vx));
        p.vy = Math.max(-0.4, Math.min(0.4, p.vy));
        p.x += p.vx;
        p.y += p.vy;
        // wrap
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        if (p.y > H + 10) p.y = -10;
      } else {
        // gentle orbital motion
        p.orbitAngle += p.orbitSpeed;
        const targetX = W / 2 + Math.cos(p.orbitAngle) * p.orbitRadius;
        const targetY = H / 2 + Math.sin(p.orbitAngle) * p.orbitRadius;
        p.x = lerp(p.x, targetX, 0.03);
        p.y = lerp(p.y, targetY, 0.03);
      }
    }
  }

  // ── Draw ────────────────────────────────────────────────
  function draw() {
    // Semi-transparent clear for trails
    ctx.fillStyle = 'rgba(10,10,15,0.25)';
    ctx.fillRect(0, 0, W, H);

    // Heartbeat glow at center
    if (phase === 'heartbeat' || phase === 'settle') {
      const beat = Math.sin(heartbeatPhase);
      const beatStrength = 0.5 + 0.5 * beat;
      const baseGlow = 0.03 + catalysts.length * 0.008;

      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 80 + beatStrength * 30);
      grad.addColorStop(0, `rgba(251,191,36,${baseGlow + beatStrength * 0.04})`);
      grad.addColorStop(0.4, `rgba(251,191,36,${(baseGlow + beatStrength * 0.02) * 0.5})`);
      grad.addColorStop(1, 'rgba(251,191,36,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(W/2, H/2, 110 + beatStrength * 30, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw pulses
    for (const pulse of pulses) {
      ctx.beginPath();
      ctx.arc(pulse.x, pulse.y, pulse.radius, 0, Math.PI * 2);
      ctx.strokeStyle = goldColor(pulse.alpha * 0.3);
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner glow ring
      const grad = ctx.createRadialGradient(
        pulse.x, pulse.y, Math.max(0, pulse.radius - 15),
        pulse.x, pulse.y, pulse.radius + 5
      );
      grad.addColorStop(0, 'rgba(251,191,36,0)');
      grad.addColorStop(0.5, `rgba(251,191,36,${pulse.alpha * 0.08})`);
      grad.addColorStop(1, 'rgba(251,191,36,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pulse.x, pulse.y, pulse.radius + 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw field particles
    for (const p of particles) {
      const heartbeat = (phase === 'heartbeat' || phase === 'settle')
        ? 0.85 + 0.15 * Math.sin(heartbeatPhase + p.orbitAngle * 0.5)
        : 1;

      let r, g, b, a;
      if (p.transformed) {
        const col = transformedColor(p);
        r = Math.round(lerp(180, col.r, p.transformT));
        g = Math.round(lerp(180, col.g, p.transformT));
        b = Math.round(lerp(180, col.b, p.transformT));
        a = lerp(p.baseAlpha, p.baseAlpha * 2.5, p.transformT) * heartbeat;
      } else {
        r = 180; g = 180; b = 180;
        a = p.baseAlpha;
      }

      // Particle glow
      if (p.transformed && p.transformT > 0.5) {
        ctx.shadowColor = `rgba(${r},${g},${b},${a * 0.4})`;
        ctx.shadowBlur = 6 + p.transformT * 4;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (p.transformed ? 1 + p.transformT * 0.3 : 1), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }

    // Draw catalysts
    for (const c of catalysts) {
      // Outer glow
      const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.glowR);
      grad.addColorStop(0, goldColor(0.5));
      grad.addColorStop(0.5, goldColor(0.15));
      grad.addColorStop(1, goldColor(0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.glowR, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fillStyle = goldColor(0.9);
      ctx.fill();

      // Pulse burst
      if (c.pulseActive) {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r + 10 * (1 - c.pulseAlpha), 0, Math.PI * 2);
        ctx.strokeStyle = goldColor(c.pulseAlpha * 0.5);
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    // Threshold line — faint, visible before first crossing
    if (catalysts.length <= 1 && phase !== 'heartbeat') {
      const threshAlpha = catalysts.length === 0 ? 0.06
        : catalysts[0].crossed ? 0.02 : 0.06;
      ctx.beginPath();
      ctx.arc(W/2, H/2, 60, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(251,191,36,${threshAlpha})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Loop ────────────────────────────────────────────────
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();

  // postMessage resize
  function reportHeight() {
    window.parent.postMessage({ iframeHeight: document.documentElement.scrollHeight }, '*');
  }
  window.addEventListener('load', reportHeight);
})();
</script>
</body>
</html>
