<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dominoes — Foundation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafaf8;color:#2c2c2a;font-family:system-ui,-apple-system,sans-serif;padding:24px;max-width:680px;margin:0 auto}
@media(prefers-color-scheme:dark){body{background:#141412;color:#d3d1c7}}
h1{font-size:22px;font-weight:500;margin:0 0 4px}
.sub{font-size:14px;color:#888;margin:0 0 16px}
</style>
</head>
<body>
<h1>The dominoes</h1>
<p class="sub">Click any crisis to start the cascade. Watch how one tips the next.</p>
<style>
.dom-container{position:relative;width:100%;min-height:420px}
.domino{position:absolute;width:70px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;transition:all 0.6s ease;transform-origin:bottom center;color:#fff}
.domino.fallen{transform:rotate(75deg);opacity:0.35}
.connector{position:absolute;height:2px;transform-origin:left center;transition:background 0.4s}
.dom-info{background:rgba(0,0,0,0.03);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:13px;line-height:1.6;color:#888;min-height:50px}
@media(prefers-color-scheme:dark){.dom-info{background:rgba(255,255,255,0.04)}}
.dom-info strong{color:inherit}
@media(prefers-color-scheme:dark){.dom-info strong{color:#d3d1c7}}
.ctrl-row{display:flex;gap:12px;margin:10px 0 0;font-size:13px;color:#888}
.ctrl-row button{font-size:12px;background:transparent;border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:4px 12px;cursor:pointer;color:inherit}
@media(prefers-color-scheme:dark){.ctrl-row button{border-color:rgba(255,255,255,0.1)}}
.credit{font-size:11px;color:#666;margin:20px 0 0;text-align:center}
.credit a{color:#534AB7;text-decoration:none}
</style>
<div class="dom-container" id="dc"></div>
<div class="dom-info" id="dinfo"><strong>Click any domino to start the cascade.</strong> Watch how one crisis triggers the next. Then click Reset and try a different starting point.</div>
<div class="ctrl-row">
  <button onclick="resetAll()">Reset</button>
  <button onclick="pushAll()">Push all</button>
  <span id="count" style="margin-left:auto">0 / 8 fallen</span>
</div>
<div class="credit">Æ — <a href="https://humanityandai.com/foundation/">Foundation</a> · Humanity and AI</div>
<script>
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
const crises=[
  {id:0,name:'Job loss',x:10,y:8,color:'#E24B4A',triggers:[1,3],desc:'Automation, downsizing, industry shift. The first domino for 40% of poverty cascades.'},
  {id:1,name:'Debt spiral',x:25,y:33,color:'#D85A30',triggers:[2,4],desc:'Payday loans at 400% APR. Credit card minimums. The poverty premium accelerates.'},
  {id:2,name:'Housing loss',x:10,y:58,color:'#BA7517',triggers:[5,6],desc:'One missed rent payment. Eviction on record. Try finding housing with that.'},
  {id:3,name:'Health crisis',x:48,y:12,color:'#D4537E',triggers:[1,4],desc:'No insurance after job loss. Defer care until the ER. $14,000 average.'},
  {id:4,name:'Mental health',x:52,y:42,color:'#993556',triggers:[5,7],desc:'Depression, anxiety, trauma. The invisible crisis amplifying every other one.'},
  {id:5,name:'Family stress',x:35,y:70,color:'#7F77DD',triggers:[6,7],desc:'Relationships crack under financial pressure. Kids absorb the cortisol.'},
  {id:6,name:'Child impact',x:15,y:86,color:'#534AB7',triggers:[],desc:'Childhood poverty costs the US $1.1 trillion/year. ACEs compound. The cycle restarts.'},
  {id:7,name:'Civic withdrawal',x:62,y:76,color:'#888780',triggers:[],desc:'Too exhausted to vote, organize, participate. Democracy loses participants.'},
];
const cont=document.getElementById('dc');let fallen=new Set();
function pctToPos(px,py){return{x:px/100*cont.clientWidth,y:py/100*cont.clientHeight}}
function render(){
  cont.innerHTML='';
  for(let cr of crises){
    for(let tid of cr.triggers){const t=crises[tid];
      const p1=pctToPos(cr.x+5,cr.y+1.5),p2=pctToPos(t.x,t.y+1.5);
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy),angle=Math.atan2(dy,dx)*180/Math.PI;
      const c=document.createElement('div');c.className='connector';
      c.style.cssText=`left:${p1.x+35}px;top:${p1.y+13}px;width:${Math.max(0,len-70)}px;transform:rotate(${angle}deg);background:${fallen.has(cr.id)?cr.color:(dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)')}`;
      cont.appendChild(c)}
  }
  for(let cr of crises){
    const pos=pctToPos(cr.x,cr.y);const d=document.createElement('div');
    d.className='domino'+(fallen.has(cr.id)?' fallen':'');
    d.style.cssText=`left:${pos.x}px;top:${pos.y}px;background:${cr.color}`;
    d.textContent=cr.name;d.onclick=()=>push(cr.id);cont.appendChild(d)}
  document.getElementById('count').textContent=fallen.size+' / '+crises.length+' fallen';
}
function push(id){if(fallen.has(id))return;fallen.add(id);const cr=crises[id];
  document.getElementById('dinfo').innerHTML=`<strong>${cr.name}</strong> — ${cr.desc}`;render();
  let delay=600;for(let tid of cr.triggers){setTimeout(()=>push(tid),delay);delay+=400}}
function resetAll(){fallen=new Set();render();
  document.getElementById('dinfo').innerHTML='<strong>Click any domino to start the cascade.</strong>'}
function pushAll(){resetAll();setTimeout(()=>push(0),200)}
render();window.addEventListener('resize',render);
</script></body></html>
