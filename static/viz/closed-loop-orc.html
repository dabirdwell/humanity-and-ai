<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closed-Loop ORC — Phoenix Wells</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1B1F2A;color:#E8E6DF;font-family:Georgia,'Times New Roman',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.wrap{max-width:960px;width:100%}
h1{font-size:14px;font-weight:400;color:#E8A838;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:3px}
.sub{font-size:11px;color:#8B8E96;text-align:center;font-family:Calibri,sans-serif;margin-bottom:14px;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
<h1>Closed-loop geothermal to compute</h1>
<p class="sub">Phoenix Wells — Humanity and AI LLC</p>
<svg width="100%" viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes fd{to{stroke-dashoffset:24}}
@keyframes fu{to{stroke-dashoffset:-24}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes gw{0%,100%{opacity:.12}50%{opacity:.3}}
.fd{stroke-dasharray:6 10;animation:fd 1.6s linear infinite}
.fu{stroke-dasharray:6 10;animation:fu 1.2s linear infinite}
.tb{transform-origin:600px 205px;animation:sp 2.2s linear infinite}
.gw{animation:gw 3s ease-in-out infinite}
text{font-family:Calibri,sans-serif}
.lab{font-size:13px;fill:#E8E6DF;font-weight:500}
.sm{font-size:11px;fill:#8B8E96}
.tag{font-size:9.5px;font-weight:500;letter-spacing:.5px}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Consortium credit -->
<text class="sm" x="480" y="14" text-anchor="middle" style="font-size:9.5px">Technology: GreenFire Energy (DBHX) · Vallourec (VIT) · ICE Thermal (ORC) — validated at Wells2Watts, Hamm Institute OKC</text>

<!-- ═══ WELL BORE (left) ═══ -->
<rect x="40" y="28" width="130" height="360" rx="3" fill="#D65108" fill-opacity=".05" stroke="#D65108" stroke-width=".5" opacity=".5"/>
<rect class="gw" x="40" y="265" width="130" height="123" fill="#D65108" opacity=".15"/>
<text class="lab" x="105" y="50" text-anchor="middle" fill="#D65108">Well bore</text>
<text class="sm" x="105" y="66" text-anchor="middle">10,000+ ft depth</text>

<!-- Cold tube -->
<rect x="72" y="82" width="8" height="242" rx="2" fill="#3B8BD4" fill-opacity=".12" stroke="#3B8BD4" stroke-width="1"/>
<path class="fd" d="M76 86 L76 320" fill="none" stroke="#3B8BD4" stroke-width="2" stroke-linecap="round"/>

<!-- Hot tube + VIT accent -->
<rect x="112" y="82" width="10" height="242" rx="2" fill="#D65108" fill-opacity=".12" stroke="#D65108" stroke-width="1"/>
<rect x="114" y="84" width="6" height="238" rx="1" fill="none" stroke="#E8A838" stroke-width=".5" stroke-dasharray="2 3" opacity=".6"/>
<path class="fu" d="M117 320 L117 86" fill="none" stroke="#D65108" stroke-width="2.5" stroke-linecap="round"/>

<!-- U-bend -->
<path d="M76 320 Q76 340 96 340 Q117 340 117 320" fill="none" stroke="#8B8E96" stroke-width="1.5"/>
<circle cx="96" cy="342" r="4" fill="#D65108" fill-opacity=".25" stroke="#D65108" stroke-width=".5"/>

<!-- Hot rock label -->
<text class="sm" x="105" y="290" text-anchor="middle" fill="#D65108">Hot rock zone</text>
<text class="sm" x="105" y="304" text-anchor="middle" fill="#D65108">100–150°C</text>

<!-- Sealed label below U-bend -->
<text class="sm" x="96" y="362" text-anchor="middle">Sealed — no contact</text>
<text class="sm" x="96" y="376" text-anchor="middle">with formation</text>

<!-- THERMOCASE badge (right of well, mid-height) -->
<rect x="180" y="145" width="90" height="18" rx="9" fill="#E8A838" fill-opacity=".12" stroke="#E8A838" stroke-width=".5"/>
<text class="tag" x="225" y="157" text-anchor="middle" fill="#E8A838">THERMOCASE</text>
<line x1="122" y1="155" x2="180" y2="155" stroke="#E8A838" stroke-width=".4" stroke-dasharray="3 3" opacity=".5"/>
<text class="sm" x="225" y="175" text-anchor="middle" fill="#E8A838">Vacuum insulated tubing</text>

<!-- GREENLOOP badge (right of well, low) -->
<rect x="180" y="326" width="88" height="18" rx="9" fill="#0D9488" fill-opacity=".12" stroke="#0D9488" stroke-width=".5"/>
<text class="tag" x="224" y="338" text-anchor="middle" fill="#0D9488">GREENLOOP</text>
<line x1="117" y1="335" x2="180" y2="335" stroke="#0D9488" stroke-width=".4" stroke-dasharray="3 3" opacity=".5"/>
<text class="sm" x="224" y="356" text-anchor="middle" fill="#0D9488">Closed-loop DBHX</text>
<text class="sm" x="224" y="370" text-anchor="middle">No fracking · No water use</text>

<!-- ═══ ORC CYCLE (right) ═══ -->

<!-- Pipes from well to evaporator -->
<path d="M117 86 L117 70 L345 70" fill="none" stroke="#D65108" stroke-width="1.5" marker-end="url(#a)"/>
<path d="M345 100 L76 100 L76 86" fill="none" stroke="#3B8BD4" stroke-width="1" marker-end="url(#a)"/>

<!-- Evaporator -->
<rect x="345" y="52" width="160" height="56" rx="6" fill="#D65108" fill-opacity=".07" stroke="#D65108" stroke-width=".7"/>
<text class="lab" x="425" y="76" text-anchor="middle">Evaporator</text>
<text class="sm" x="425" y="92" text-anchor="middle">Heat exchange</text>

<!-- Hot vapor to turbine -->
<path class="fu" d="M505 76 L560 76 L560 175" fill="none" stroke="#D65108" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
<text class="sm" x="538" y="130" text-anchor="start" fill="#D65108">Hot vapor</text>
<text class="sm" x="538" y="144" text-anchor="start" fill="#D65108">(isobutane)</text>

<!-- ORC Turbine -->
<rect x="555" y="175" width="90" height="60" rx="30" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".5"/>
<circle cx="600" cy="205" r="22" fill="none" stroke="#8B8E96" stroke-width=".4"/>
<g class="tb">
<line x1="600" y1="186" x2="600" y2="224" stroke="#E8E6DF" stroke-width="1.2" opacity=".4"/>
<line x1="581" y1="205" x2="619" y2="205" stroke="#E8E6DF" stroke-width="1.2" opacity=".4"/>
<line x1="586" y1="191" x2="614" y2="219" stroke="#E8E6DF" stroke-width="1" opacity=".3"/>
<line x1="614" y1="191" x2="586" y2="219" stroke="#E8E6DF" stroke-width="1" opacity=".3"/>
</g>
<text class="lab" x="600" y="163" text-anchor="middle">ORC turbine</text>

<!-- ICE badge -->
<rect x="562" y="240" width="76" height="16" rx="8" fill="#E8E6DF" fill-opacity=".06" stroke="#8B8E96" stroke-width=".4"/>
<text class="tag" x="600" y="251" text-anchor="middle" fill="#8B8E96">ICE THERMAL</text>

<!-- Spent vapor to condenser -->
<path d="M600 235 L600 300" fill="none" stroke="#8B8E96" stroke-width=".8" marker-end="url(#a)"/>
<text class="sm" x="612" y="275" text-anchor="start">Spent vapor</text>

<!-- Condenser -->
<rect x="345" y="300" width="160" height="50" rx="6" fill="#3B8BD4" fill-opacity=".05" stroke="#3B8BD4" stroke-width=".7"/>
<text class="lab" x="425" y="322" text-anchor="middle">Condenser</text>
<text class="sm" x="425" y="338" text-anchor="middle">Vapor → liquid (air cooled)</text>

<!-- Condenser to turbine connection -->
<path class="fd" d="M600 300 L600 320 L505 320" fill="none" stroke="#3B8BD4" stroke-width="1.5" stroke-linecap="round"/>

<!-- Feed pump -->
<rect x="335" y="195" width="42" height="50" rx="21" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".5"/>
<text class="sm" x="356" y="265" text-anchor="middle">Pump</text>

<!-- Liquid: condenser → pump -->
<path class="fd" d="M345 325 L310 325 L310 245 L335 245" fill="none" stroke="#3B8BD4" stroke-width="1.5" stroke-linecap="round" marker-end="url(#a)"/>
<text class="sm" x="300" y="290" text-anchor="end" fill="#3B8BD4">Liquid</text>

<!-- Pressurized: pump → evaporator -->
<path d="M356 195 L356 108 L345 108" fill="none" stroke="#E8A838" stroke-width="1" marker-end="url(#a)" opacity=".7"/>
<text class="sm" x="365" y="155" text-anchor="start" fill="#E8A838">Pressurized</text>

<!-- ═══ OUTPUT (far right) ═══ -->

<!-- Turbine to generator -->
<line x1="645" y1="205" x2="700" y2="205" stroke="#0D9488" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Generator -->
<rect x="700" y="175" width="120" height="60" rx="6" fill="#0D9488" fill-opacity=".1" stroke="#0D9488" stroke-width="1"/>
<text class="lab" x="760" y="199" text-anchor="middle" fill="#0D9488">Generator</text>
<text class="lab" x="760" y="218" text-anchor="middle" fill="#0D9488" style="font-size:16px">30–100 kW</text>

<!-- Power to compute -->
<line x1="760" y1="235" x2="760" y2="268" stroke="#0D9488" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>

<!-- Compute box -->
<rect x="700" y="268" width="120" height="90" rx="6" fill="#0D9488" fill-opacity=".04" stroke="#0D9488" stroke-width=".5"/>
<text class="sm" x="760" y="286" text-anchor="middle" fill="#0D9488">Behind-the-meter</text>
<rect x="714" y="294" width="92" height="22" rx="4" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".3"/>
<text class="sm" x="760" y="309" text-anchor="middle" fill="#E8E6DF">AI inference</text>
<rect x="714" y="324" width="92" height="22" rx="4" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".3"/>
<text class="sm" x="760" y="339" text-anchor="middle" fill="#E8E6DF">Bitcoin mining</text>

<!-- ═══ FOOTER ═══ -->
<line x1="40" y1="406" x2="920" y2="406" stroke="#8B8E96" stroke-width=".3" opacity=".25"/>
<text class="sm" x="160" y="424" text-anchor="middle">Isobutane boils at ~60°C</text>
<text x="310" y="424" fill="#8B8E96" font-size="8" text-anchor="middle">·</text>
<text class="sm" x="480" y="424" text-anchor="middle">Closed loop — zero water use</text>
<text x="650" y="424" fill="#8B8E96" font-size="8" text-anchor="middle">·</text>
<text class="sm" x="800" y="424" text-anchor="middle">24/7 power — 50+ year lifespan</text>

</svg>
</div>
</body>
</html>
