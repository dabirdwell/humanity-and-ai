<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closed-Loop ORC — Phoenix Wells</title>
<style>
body{margin:0;padding:20px;background:#fafaf8;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
@media(prefers-color-scheme:dark){body{background:#1a1a1a}}
@keyframes flowDown{to{stroke-dashoffset:24}}
@keyframes flowUp{to{stroke-dashoffset:-24}}
@keyframes spinT{to{transform:rotate(360deg)}}
@keyframes heatPulse{0%,100%{opacity:.2}50%{opacity:.5}}
@media(prefers-reduced-motion:reduce){.anim{animation:none!important}}
.fd{stroke-dasharray:6 12;animation:flowDown 1.5s linear infinite}
.fu{stroke-dasharray:6 12;animation:flowUp 1.2s linear infinite}
.tb{transform-origin:478px 248px;animation:spinT 2s linear infinite}
.hp{animation:heatPulse 3s ease-in-out infinite}
.th{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;font-weight:500}
.ts{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;fill:#64748B}
.leader{stroke:#94A3B8;stroke-width:.5;stroke-dasharray:3 3}
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<linearGradient id="rock" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#94A3B8" stop-opacity=".08"/><stop offset="60%" stop-color="#B85042" stop-opacity=".15"/><stop offset="100%" stop-color="#E24B4A" stop-opacity=".35"/></linearGradient>
</defs>

<rect x="30" y="50" width="180" height="480" rx="4" fill="url(#rock)" stroke="#64748B" stroke-width=".5" opacity=".5"/>
<rect x="30" y="50" width="180" height="60" rx="4" fill="none" stroke="#64748B" stroke-width=".3" stroke-dasharray="4 4" opacity=".3"/>
<text class="ts" x="120" y="75" text-anchor="middle" fill="#64748B">Surface</text>
<text class="ts" x="120" y="93" text-anchor="middle" fill="#64748B">Wellhead</text>

<rect class="hp" x="30" y="380" width="180" height="150" rx="0" fill="#E24B4A" opacity=".12"/>
<text class="ts" x="120" y="405" text-anchor="middle" fill="#B85042">Hot rock zone</text>
<text class="ts" x="120" y="421" text-anchor="middle" fill="#B85042">100-150°C at 10,000 ft</text>

<rect x="72" y="110" width="12" height="330" rx="3" fill="#3B8BD4" fill-opacity=".08" stroke="#3B8BD4" stroke-width="1.5"/>
<text class="ts" x="40" y="260" text-anchor="middle" fill="#3B8BD4" writing-mode="tb" style="letter-spacing:2px">COOL FLUID DOWN</text>

<!-- Hot tube up with VIT indicator -->
<rect x="128" y="110" width="16" height="330" rx="3" fill="#E24B4A" fill-opacity=".08" stroke="#E24B4A" stroke-width="1.5"/>
<rect x="130" y="112" width="12" height="326" rx="2" fill="none" stroke="#D4A843" stroke-width=".5" stroke-dasharray="2 4" opacity=".6"/>

<!-- Animated flows -->
<path class="fd anim" d="M78 115 L78 430" fill="none" stroke="#3B8BD4" stroke-width="2.5" stroke-linecap="round"/>
<path class="fu anim" d="M136 430 L136 115" fill="none" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>

<!-- Bottom U-bend (sealed) -->
<path d="M78 430 Q78 450 108 450 Q136 450 136 430" fill="none" stroke="#64748B" stroke-width="2" opacity=".5"/>
<circle cx="108" cy="452" r="8" fill="#E24B4A" fill-opacity=".2" stroke="#E24B4A" stroke-width=".5"/>
<text class="ts" x="108" y="475" text-anchor="middle" fill="#B85042">Heat absorbed</text>
<text class="ts" x="108" y="491" text-anchor="middle" fill="#B85042">Sealed — no contact</text>
<text class="ts" x="108" y="507" text-anchor="middle" fill="#B85042">with formation</text>

<!-- Label: Vallourec THERMOCASE -->
<line class="leader" x1="144" y1="200" x2="216" y2="160"/>
<circle cx="144" cy="200" r="2" fill="#64748B"/>
<text class="th" x="222" y="155" text-anchor="start" fill="#D4A843">Vallourec THERMOCASE</text>
<text class="ts" x="222" y="171" text-anchor="start" fill="#D4A843">Vacuum insulated tubing</text>
<text class="ts" x="222" y="185" text-anchor="start">Prevents heat loss on return</text>
<text class="ts" x="222" y="199" text-anchor="start">Made in Louisiana (USA)</text>

<!-- Label: GreenFire GreenLoop -->
<line class="leader" x1="108" y1="440" x2="216" y2="440"/>
<circle cx="108" cy="440" r="2" fill="#64748B"/>
<text class="th" x="222" y="435" text-anchor="start" fill="#0D9488">GreenFire GreenLoop</text>
<text class="ts" x="222" y="451" text-anchor="start" fill="#0D9488">Closed-loop DBHX</text>
<text class="ts" x="222" y="465" text-anchor="start">Working fluid sealed in tube</text>
<text class="ts" x="222" y="479" text-anchor="start">No fracking, no water use</text>
<text class="ts" x="222" y="493" text-anchor="start">No groundwater contact</text>

<!-- Evaporator -->
<rect x="300" y="60" width="160" height="56" rx="8" fill="#f5f0eb" stroke="#94A3B8" stroke-width=".5"/>
<text class="th" x="380" y="83" text-anchor="middle" fill="#1E293B">Evaporator</text>
<text class="ts" x="380" y="99" text-anchor="middle">Geothermal heat → ORC fluid</text>
<path d="M144 115 L144 88 L300 88" fill="none" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M300 78 L78 78 L78 115" fill="none" stroke="#3B8BD4" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Condenser -->
<rect x="300" y="340" width="160" height="56" rx="8" fill="#f5f0eb" stroke="#94A3B8" stroke-width=".5"/>
<text class="th" x="380" y="363" text-anchor="middle" fill="#1E293B">Condenser</text>
<text class="ts" x="380" y="379" text-anchor="middle">Vapor → liquid (air cooled)</text>

<!-- Feed pump -->
<rect x="300" y="220" width="50" height="70" rx="25" fill="#f5f0eb" stroke="#94A3B8" stroke-width=".5"/>
<text class="ts" x="325" y="330" text-anchor="middle">Feed</text>
<text class="ts" x="325" y="344" text-anchor="middle">pump</text>

<!-- Turbine -->
<rect x="440" y="218" width="76" height="60" rx="30" fill="#f5f0eb" stroke="#94A3B8" stroke-width=".5"/>
<circle cx="478" cy="248" r="22" fill="none" stroke="#64748B" stroke-width=".5" opacity=".3"/>
<g class="tb anim">
<line x1="478" y1="228" x2="478" y2="268" stroke="#64748B" stroke-width="1.5" opacity=".5"/>
<line x1="458" y1="248" x2="498" y2="248" stroke="#64748B" stroke-width="1.5" opacity=".5"/>
<line x1="464" y1="234" x2="492" y2="262" stroke="#64748B" stroke-width="1.2" opacity=".4"/>
<line x1="492" y1="234" x2="464" y2="262" stroke="#64748B" stroke-width="1.2" opacity=".4"/>
</g>
<text class="th" x="478" y="210" text-anchor="middle" fill="#1E293B">ORC turbine</text>
<text class="ts" x="478" y="296" text-anchor="middle">ICE Thermal Harvesting</text>
<text class="ts" x="478" y="310" text-anchor="middle">Organic Rankine Cycle</text>

<!-- Flow: evaporator to turbine (hot vapor) -->
<path class="fu anim" d="M460 88 L500 88 L500 218" fill="none" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="150" text-anchor="start" fill="#B85042">Hot vapor</text>
<text class="ts" x="510" y="164" text-anchor="start" fill="#B85042">(isobutane)</text>

<!-- Flow: turbine to condenser -->
<path d="M478 278 L478 340" fill="none" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)" opacity=".5"/>
<text class="ts" x="490" y="320" text-anchor="start">Spent vapor</text>

<!-- Flow: condenser to pump (liquid) -->
<path class="fd anim" d="M380 396 L380 420 L325 420 L325 290" fill="none" stroke="#3B8BD4" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
<text class="ts" x="365" y="418" text-anchor="end" fill="#3B8BD4">Liquid</text>

<!-- Flow: pump to evaporator (pressurized) -->
<path d="M325 220 L325 116 L300 116" fill="none" stroke="#D4A843" stroke-width="1.5" marker-end="url(#arrow)" opacity=".7"/>
<text class="ts" x="310" y="140" text-anchor="end" fill="#D4A843">Pressurized</text>

<!-- Generator -->
<line x1="516" y1="248" x2="545" y2="248" stroke="#0D9488" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="545" y="218" width="120" height="60" rx="8" fill="#0D9488" fill-opacity=".08" stroke="#0D9488" stroke-width="1"/>
<text class="th" x="605" y="240" text-anchor="middle" fill="#0D9488">Generator</text>
<text class="ts" x="605" y="258" text-anchor="middle" fill="#0D9488">30–100 kW</text>
<text class="ts" x="605" y="272" text-anchor="middle" fill="#0D9488">per well</text>

<!-- Compute outputs -->
<rect x="545" y="300" width="120" height="100" rx="8" fill="#0D9488" fill-opacity=".04" stroke="#0D9488" stroke-width=".5"/>
<text class="ts" x="605" y="320" text-anchor="middle" fill="#0D9488">Behind-the-meter</text>
<rect x="555" y="332" width="100" height="24" rx="4" fill="#f5f0eb" stroke="#94A3B8" stroke-width=".5"/>
<text class="ts" x="605" y="348" text-anchor="middle" fill="#1E293B">AI inference</text>
<rect x="555" y="362" width="100" height="24" rx="4" fill="#f5f0eb" stroke="#94A3B8" stroke-width=".5"/>
<text class="ts" x="605" y="378" text-anchor="middle" fill="#1E293B">Bitcoin mining</text>
<line x1="605" y1="278" x2="605" y2="300" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow)" opacity=".6"/>

<!-- Footer text -->
<text class="ts" x="340" y="545" text-anchor="middle">Working fluid (isobutane) boils at ~60°C — no steam temperatures needed</text>
<text class="ts" x="340" y="563" text-anchor="middle">Closed loop: nothing enters or leaves the cycle. No water consumed.</text>
<text class="ts" x="340" y="581" text-anchor="middle">The well provides heat. The ORC converts it to electricity. 24/7, 50+ year lifespan.</text>

<!-- Abandoned well callout -->
<rect x="40" y="545" width="150" height="55" rx="8" fill="none" stroke="#94A3B8" stroke-width=".5" stroke-dasharray="4 4"/>
<text class="ts" x="115" y="565" text-anchor="middle" fill="#1E293B">Abandoned OK well</text>
<text class="ts" x="115" y="581" text-anchor="middle">Already drilled — 90% savings</text>

</svg>
<p style="text-align:center;font-size:11px;color:#94A3B8;margin-top:12px">Phoenix Wells — Humanity and AI LLC — humanityandai.com</p>
</body>
</html>
