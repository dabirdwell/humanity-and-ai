<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closed-Loop ORC — Phoenix Wells</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1B1F2A;color:#E8E6DF;font-family:Georgia,'Times New Roman',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.wrap{max-width:900px;width:100%}
h1{font-size:15px;font-weight:400;color:#E8A838;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:4px}
.sub{font-size:12px;color:#8B8E96;text-align:center;font-family:Calibri,sans-serif;margin-bottom:16px;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
<h1>Closed-loop geothermal to compute</h1>
<p class="sub">Phoenix Wells — Humanity and AI LLC</p>
<svg width="100%" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes fd{to{stroke-dashoffset:24}}
@keyframes fu{to{stroke-dashoffset:-24}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes gw{0%,100%{opacity:.15}50%{opacity:.35}}
.fd{stroke-dasharray:6 10;animation:fd 1.6s linear infinite}
.fu{stroke-dasharray:6 10;animation:fu 1.2s linear infinite}
.tb{transform-origin:540px 195px;animation:sp 2.2s linear infinite}
.gw{animation:gw 3s ease-in-out infinite}
text{font-family:Calibri,sans-serif}
.lab{font-size:13px;fill:#E8E6DF;font-weight:500}
.sm{font-size:11px;fill:#8B8E96}
.tag{font-size:10px;font-weight:500;letter-spacing:.5px}
</style>
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Well bore -->
<rect x="30" y="20" width="120" height="370" rx="3" fill="#D65108" fill-opacity=".06" stroke="#D65108" stroke-width=".5" opacity=".6"/>
<rect x="30" y="260" width="120" height="130" fill="#D65108" fill-opacity=".1"/>
<rect class="gw" x="30" y="280" width="120" height="110" fill="#D65108" opacity=".1"/>
<text class="lab" x="90" y="42" text-anchor="middle" fill="#D65108">Well bore</text>
<text class="sm" x="90" y="58" text-anchor="middle">10,000+ ft</text>

<!-- Cold tube down -->
<rect x="58" y="70" width="8" height="260" rx="2" fill="#3B8BD4" fill-opacity=".15" stroke="#3B8BD4" stroke-width="1"/>
<path class="fd" d="M62 74 L62 326" fill="none" stroke="#3B8BD4" stroke-width="2" stroke-linecap="round"/>

<!-- Hot tube up (with VIT accent) -->
<rect x="100" y="70" width="10" height="260" rx="2" fill="#D65108" fill-opacity=".15" stroke="#D65108" stroke-width="1"/>
<rect x="102" y="72" width="6" height="256" rx="1" fill="none" stroke="#E8A838" stroke-width=".5" stroke-dasharray="2 3" opacity=".7"/>
<path class="fu" d="M105 326 L105 74" fill="none" stroke="#D65108" stroke-width="2.5" stroke-linecap="round"/>

<!-- U-bend sealed bottom -->
<path d="M62 326 Q62 345 83 345 Q105 345 105 326" fill="none" stroke="#8B8E96" stroke-width="1.5"/>
<circle cx="83" cy="347" r="5" fill="#D65108" fill-opacity=".2" stroke="#D65108" stroke-width=".5"/>
<text class="sm" x="90" y="295" text-anchor="middle" fill="#D65108">Hot rock</text>
<text class="sm" x="90" y="309" text-anchor="middle" fill="#D65108">100–150°C</text>
<text class="sm" x="90" y="368" text-anchor="middle">Sealed loop</text>
<text class="sm" x="90" y="382" text-anchor="middle">No formation contact</text>

<!-- Technology badges -->
<rect x="14" y="152" width="80" height="18" rx="9" fill="#E8A838" fill-opacity=".15" stroke="#E8A838" stroke-width=".5"/>
<text class="tag" x="54" y="164" text-anchor="middle" fill="#E8A838">THERMOCASE</text>
<line x1="94" y1="161" x2="100" y2="161" stroke="#E8A838" stroke-width=".5" opacity=".6"/>

<rect x="14" y="330" width="86" height="18" rx="9" fill="#0D9488" fill-opacity=".15" stroke="#0D9488" stroke-width=".5"/>
<text class="tag" x="57" y="342" text-anchor="middle" fill="#0D9488">GREENLOOP</text>
<line x1="100" y1="339" x2="105" y2="339" stroke="#0D9488" stroke-width=".5" opacity=".6"/>

<!-- Pipes from well to ORC -->
<path d="M105 74 L105 64 L220 64" fill="none" stroke="#D65108" stroke-width="1.5" marker-end="url(#a)"/>
<path d="M220 94 L62 94 L62 74" fill="none" stroke="#3B8BD4" stroke-width="1" marker-end="url(#a)"/>

<!-- Evaporator -->
<rect x="220" y="48" width="155" height="52" rx="6" fill="#D65108" fill-opacity=".08" stroke="#D65108" stroke-width=".8"/>
<text class="lab" x="298" y="72" text-anchor="middle">Evaporator</text>
<text class="sm" x="298" y="88" text-anchor="middle">Heat exchange</text>

<!-- Hot vapor to turbine -->
<path class="fu" d="M375 70 L500 70 L500 165" fill="none" stroke="#D65108" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
<text class="sm" x="440" y="62" text-anchor="middle" fill="#D65108">Hot vapor</text>

<!-- ORC Turbine -->
<rect x="480" y="165" width="75" height="60" rx="30" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".5"/>
<circle cx="518" cy="195" r="20" fill="none" stroke="#8B8E96" stroke-width=".4"/>
<g class="tb">
<line x1="518" y1="178" x2="518" y2="212" stroke="#E8E6DF" stroke-width="1.2" opacity=".4"/>
<line x1="501" y1="195" x2="535" y2="195" stroke="#E8E6DF" stroke-width="1.2" opacity=".4"/>
<line x1="506" y1="182" x2="530" y2="208" stroke="#E8E6DF" stroke-width="1" opacity=".3"/>
<line x1="530" y1="182" x2="506" y2="208" stroke="#E8E6DF" stroke-width="1" opacity=".3"/>
</g>
<text class="lab" x="518" y="155" text-anchor="middle">ORC turbine</text>

<!-- ICE badge under turbine -->
<rect x="478" y="230" width="80" height="18" rx="9" fill="#E8E6DF" fill-opacity=".08" stroke="#8B8E96" stroke-width=".5"/>
<text class="tag" x="518" y="242" text-anchor="middle" fill="#8B8E96">ICE THERMAL</text>

<!-- Spent vapor to condenser -->
<path d="M518 225 L518 290" fill="none" stroke="#8B8E96" stroke-width="1" marker-end="url(#a)"/>

<!-- Condenser -->
<rect x="220" y="285" width="155" height="48" rx="6" fill="#3B8BD4" fill-opacity=".06" stroke="#3B8BD4" stroke-width=".8"/>
<text class="lab" x="298" y="307" text-anchor="middle">Condenser</text>
<text class="sm" x="298" y="322" text-anchor="middle">Vapor → liquid</text>

<!-- Liquid from condenser to pump -->
<path class="fd" d="M518 290 L518 310 L375 310" fill="none" stroke="#3B8BD4" stroke-width="1.5" stroke-linecap="round"/>
<path class="fd" d="M220 310 L200 310 L200 210" fill="none" stroke="#3B8BD4" stroke-width="1.5" stroke-linecap="round" marker-end="url(#a)"/>

<!-- Feed pump -->
<rect x="185" y="175" width="40" height="50" rx="20" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".5"/>
<text class="sm" x="205" y="250" text-anchor="middle">Pump</text>

<!-- Pressurized liquid back to evaporator -->
<path d="M205 175 L205 94 L220 94" fill="none" stroke="#E8A838" stroke-width="1" marker-end="url(#a)" opacity=".7"/>
<text class="sm" x="195" y="140" text-anchor="end" fill="#E8A838">Pressurized</text>

<!-- Turbine to generator -->
<line x1="555" y1="195" x2="620" y2="195" stroke="#0D9488" stroke-width="1.5" marker-end="url(#a)"/>

<!-- Generator -->
<rect x="620" y="165" width="110" height="60" rx="6" fill="#0D9488" fill-opacity=".1" stroke="#0D9488" stroke-width="1"/>
<text class="lab" x="675" y="190" text-anchor="middle" fill="#0D9488">Generator</text>
<text class="lab" x="675" y="208" text-anchor="middle" fill="#0D9488" style="font-size:16px">30–100 kW</text>

<!-- Power down to compute -->
<line x1="675" y1="225" x2="675" y2="260" stroke="#0D9488" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>

<!-- Compute box -->
<rect x="620" y="260" width="110" height="90" rx="6" fill="#0D9488" fill-opacity=".04" stroke="#0D9488" stroke-width=".5"/>
<text class="sm" x="675" y="278" text-anchor="middle" fill="#0D9488">Behind-the-meter</text>
<rect x="632" y="286" width="86" height="22" rx="4" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".3"/>
<text class="sm" x="675" y="301" text-anchor="middle" fill="#E8E6DF">AI inference</text>
<rect x="632" y="316" width="86" height="22" rx="4" fill="#2A2E3A" stroke="#8B8E96" stroke-width=".3"/>
<text class="sm" x="675" y="331" text-anchor="middle" fill="#E8E6DF">Bitcoin mining</text>

<!-- Bottom annotation bar -->
<line x1="30" y1="400" x2="850" y2="400" stroke="#8B8E96" stroke-width=".3" opacity=".3"/>
<text class="sm" x="170" y="415" text-anchor="middle">Isobutane boils at ~60°C</text>
<text x="300" y="415" fill="#8B8E96" font-size="8" text-anchor="middle">•</text>
<text class="sm" x="430" y="415" text-anchor="middle">Closed loop — zero water use</text>
<text x="560" y="415" fill="#8B8E96" font-size="8" text-anchor="middle">•</text>
<text class="sm" x="700" y="415" text-anchor="middle">24/7 power — 50+ year lifespan</text>

<!-- Consortium credit -->
<text class="sm" x="440" y="12" text-anchor="middle" style="font-size:10px" fill="#8B8E96">Technology: GreenFire Energy (DBHX) · Vallourec (VIT) · ICE Thermal (ORC) — validated at Wells2Watts consortium, Hamm Institute OKC</text>

</svg>
</div>
</body>
</html>
