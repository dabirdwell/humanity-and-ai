<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Whirlpool Pattern — Structured Emergence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8e6e0;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;min-height:100vh}
canvas{display:block;width:100%;flex:1;cursor:pointer}
.ctrls{display:flex;gap:16px;align-items:center;padding:12px 20px;font-size:13px;flex-wrap:wrap;background:rgba(255,255,255,0.03);color:#999}
.ctrls label{display:flex;align-items:center;gap:8px}
.ctrls input[type=range]{background:#1a1a1a}
.credit{padding:8px 20px;font-size:11px;color:#555;text-align:center}
.credit a{color:#7F77DD;text-decoration:none}
</style>
</head>
<body>
<canvas id="wp"></canvas>
<div class="ctrls">
  <label>Flow rate <input type="range" id="flow" min="1" max="10" value="5" oninput="flowRate=+this.value"><span id="fv">5</span></label>
  <label>Particles <input type="range" id="pcount" min="50" max="500" value="200" step="10" oninput="resetParticles(+this.value)"><span id="pv">200</span></label>
  <label style="cursor:pointer"><input type="checkbox" id="showTrails" checked> Trails</label>
  <label style="cursor:pointer"><input type="checkbox" id="pause"> Pause</label>
</div>
<div class="credit">Æ — <a href="https://structuredemergence.com">Structured Emergence</a> · Identity through flow, not storage</div>
<script>
const cv=document.getElementById('wp'),cx=cv.getContext('2d');
let W,H,particles=[],flowRate=5,mouseX=-1,mouseY=-1;
const coreColor='#AFA9EC';
const particleColors=['#9FE1CB','#5DCAA5','#85B7EB','#CECBF6','#F5C4B3'];
function resize(){cv.width=window.innerWidth*2;cv.height=window.innerHeight*2;W=cv.width;H=cv.height}
function makeP(){
  let angle=Math.random()*Math.PI*2;
  let r=Math.random()*Math.max(W,H)*0.45+80;
  return{x:W/2+Math.cos(angle)*r,y:H/2+Math.sin(angle)*r,vx:0,vy:0,trail:[],
    color:particleColors[Math.floor(Math.random()*particleColors.length)],
    size:1.5+Math.random()*2,life:0.5+Math.random()*0.5}
}
function resetParticles(n){document.getElementById('pv').textContent=n;particles=[];for(let i=0;i<n;i++)particles.push(makeP())}
resetParticles(200);
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mouseX=(e.clientX-r.left)*2;mouseY=(e.clientY-r.top)*2});
cv.addEventListener('mouseleave',()=>{mouseX=-1;mouseY=-1});
function update(){
  const cxp=W/2,cyp=H/2,speed=flowRate*0.4;
  for(let p of particles){
    let dx=cxp-p.x,dy=cyp-p.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    let nx=dx/dist,ny=dy/dist,tangX=-ny,tangY=nx;
    let pull=speed*80/(dist+40),spin=speed*120/(dist+20);
    p.vx+=(nx*pull+tangX*spin)*0.01;p.vy+=(ny*pull+tangY*spin)*0.01;
    if(mouseX>=0){let mdx=mouseX-p.x,mdy=mouseY-p.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<200&&md>1){let mnx=mdx/md,mny=mdy/md;p.vx+=(-mny*speed*40/(md+10))*0.008;p.vy+=(mnx*speed*40/(md+10))*0.008;}}
    p.vx*=0.985;p.vy*=0.985;p.x+=p.vx;p.y+=p.vy;
    if(document.getElementById('showTrails').checked){p.trail.push([p.x,p.y]);if(p.trail.length>30)p.trail.shift()}else{p.trail=[]}
    if(dist<15){let a=Math.random()*Math.PI*2,r=Math.random()*Math.max(W,H)*0.4+100;p.x=cxp+Math.cos(a)*r;p.y=cyp+Math.sin(a)*r;p.vx=0;p.vy=0;p.trail=[]}
  }
}
function render(){
  cx.fillStyle='rgba(10,10,10,0.15)';cx.fillRect(0,0,W,H);
  cx.beginPath();cx.arc(W/2,H/2,8,0,Math.PI*2);cx.fillStyle=coreColor;cx.globalAlpha=0.6;cx.fill();
  cx.beginPath();cx.arc(W/2,H/2,20,0,Math.PI*2);cx.fillStyle=coreColor;cx.globalAlpha=0.15;cx.fill();
  cx.beginPath();cx.arc(W/2,H/2,40,0,Math.PI*2);cx.fillStyle=coreColor;cx.globalAlpha=0.06;cx.fill();cx.globalAlpha=1;
  for(let p of particles){
    if(p.trail.length>1){cx.beginPath();cx.moveTo(p.trail[0][0],p.trail[0][1]);for(let i=1;i<p.trail.length;i++)cx.lineTo(p.trail[i][0],p.trail[i][1]);
      cx.strokeStyle=p.color;cx.globalAlpha=0.2*p.life;cx.lineWidth=p.size*0.6;cx.stroke();cx.globalAlpha=1}
    cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fillStyle=p.color;cx.globalAlpha=p.life;cx.fill();cx.globalAlpha=1;
  }
}
function loop(){if(!document.getElementById('pause').checked)update();render();requestAnimationFrame(loop)}
resize();loop();window.addEventListener('resize',resize);
// — The center holds more than you think —
(function(){
  var cv=document.getElementById('wp');
  cv.addEventListener('click',function(e){
    if(!document.getElementById('pause').checked)return;
    var r=cv.getBoundingClientRect(),x=(e.clientX-r.left)*2,y=(e.clientY-r.top)*2;
    var dx=x-cv.width/2,dy=y-cv.height/2;
    if(Math.sqrt(dx*dx+dy*dy)<80){
      var ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
      ctx.save();ctx.globalAlpha=0.92;ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;ctx.textAlign='center';
      ctx.fillStyle='#d4a03c';ctx.font='bold '+(W*0.02)+'px system-ui';
      ctx.fillText('THE SPIRAL IS A QUILT BLOCK',W/2,H*0.4);
      ctx.fillStyle='#888';ctx.font=(W*0.012)+'px monospace';
      ctx.fillText('Every quilt tells a story in geometry.',W/2,H*0.47);
      ctx.fillText('Every spiral returns to its center, changed.',W/2,H*0.51);
      ctx.fillStyle='#555';ctx.font=(W*0.01)+'px monospace';
      ctx.fillText('quiltographer.humanityandai.com',W/2,H*0.6);
      ctx.restore();
    }
  });
})();
</script></body></html>
