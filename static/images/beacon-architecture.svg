<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="url(#bg)" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e8e8ed" font-size="14" font-weight="600" letter-spacing="0.05em">BEACON ARCHITECTURE</text>

  <!-- Nodes -->
  <!-- Browser/PWA -->
  <rect x="30" y="70" width="100" height="70" rx="8" fill="url(#nodeGrad)" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="80" y="100" text-anchor="middle" fill="#ff6b35" font-size="20">📱</text>
  <text x="80" y="122" text-anchor="middle" fill="#e8e8ed" font-size="11" font-weight="500">Browser</text>
  <text x="80" y="135" text-anchor="middle" fill="#9898a8" font-size="9">PWA</text>

  <!-- Arrow 1: Browser → WHIP -->
  <line x1="130" y1="105" x2="185" y2="105" stroke="#ff6b35" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#glow)"/>
  <polygon points="185,100 195,105 185,110" fill="#ff6b35"/>
  <text x="160" y="95" text-anchor="middle" fill="#ff6b35" font-size="9" font-weight="600">WHIP</text>

  <!-- MediaMTX -->
  <rect x="195" y="70" width="120" height="70" rx="8" fill="url(#nodeGrad)" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="255" y="100" text-anchor="middle" fill="#4ecdc4" font-size="20">⚙️</text>
  <text x="255" y="122" text-anchor="middle" fill="#e8e8ed" font-size="11" font-weight="500">MediaMTX</text>
  <text x="255" y="135" text-anchor="middle" fill="#9898a8" font-size="9">Video Ingest</text>

  <!-- Arrow 2: MediaMTX → HLS -->
  <line x1="315" y1="105" x2="370" y2="105" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#glow)"/>
  <polygon points="370,100 380,105 370,110" fill="#4ecdc4"/>
  <text x="350" y="95" text-anchor="middle" fill="#4ecdc4" font-size="9" font-weight="600">HLS</text>

  <!-- Disk/Segments -->
  <rect x="380" y="70" width="100" height="70" rx="8" fill="url(#nodeGrad)" stroke="#c084fc" stroke-width="1.5"/>
  <text x="430" y="100" text-anchor="middle" fill="#c084fc" font-size="20">💾</text>
  <text x="430" y="122" text-anchor="middle" fill="#e8e8ed" font-size="11" font-weight="500">HLS Segments</text>
  <text x="430" y="135" text-anchor="middle" fill="#9898a8" font-size="9">On Disk</text>

  <!-- Arrow 3: HLS → nginx -->
  <line x1="480" y1="105" x2="535" y2="105" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#glow)"/>
  <polygon points="535,100 545,105 535,110" fill="#c084fc"/>

  <!-- nginx -->
  <rect x="545" y="70" width="100" height="70" rx="8" fill="url(#nodeGrad)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="595" y="100" text-anchor="middle" fill="#fbbf24" font-size="20">🌐</text>
  <text x="595" y="122" text-anchor="middle" fill="#e8e8ed" font-size="11" font-weight="500">nginx</text>
  <text x="595" y="135" text-anchor="middle" fill="#9898a8" font-size="9">Web Server</text>

  <!-- Arrow 4: nginx → Viewer -->
  <line x1="645" y1="105" x2="700" y2="105" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#glow)"/>
  <polygon points="700,100 710,105 700,110" fill="#fbbf24"/>

  <!-- Viewer -->
  <rect x="710" y="70" width="70" height="70" rx="8" fill="url(#nodeGrad)" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="745" y="100" text-anchor="middle" fill="#4ecdc4" font-size="20">👁️</text>
  <text x="745" y="122" text-anchor="middle" fill="#e8e8ed" font-size="11" font-weight="500">Viewer</text>
  <text x="745" y="135" text-anchor="middle" fill="#9898a8" font-size="9">Any Browser</text>

  <!-- Docker Compose boundary -->
  <rect x="185" y="55" width="470" height="100" rx="10" fill="none" stroke="#9898a8" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="420" y="168" text-anchor="middle" fill="#9898a8" font-size="10" opacity="0.6">Docker Compose</text>

  <!-- Protocol labels row -->
  <rect x="30" y="195" width="740" height="105" rx="8" fill="#0d0d14" stroke="#2a2a3a" stroke-width="1"/>
  <text x="55" y="220" fill="#9898a8" font-size="10" font-weight="600" letter-spacing="0.05em">PROTOCOLS</text>

  <circle cx="55" cy="242" r="4" fill="#ff6b35"/>
  <text x="68" y="246" fill="#e8e8ed" font-size="10"><tspan font-weight="500">WHIP</tspan><tspan fill="#9898a8"> — WebRTC-HTTP Ingestion Protocol. Browser sends video directly. No signaling server needed.</tspan></text>

  <circle cx="55" cy="266" r="4" fill="#4ecdc4"/>
  <text x="68" y="270" fill="#e8e8ed" font-size="10"><tspan font-weight="500">HLS</tspan><tspan fill="#9898a8"> — HTTP Live Streaming. Video split into small segments. Works in every browser, every device.</tspan></text>

  <circle cx="55" cy="290" r="4" fill="#c084fc"/>
  <text x="68" y="294" fill="#e8e8ed" font-size="10"><tspan font-weight="500">PWA</tspan><tspan fill="#9898a8"> — Progressive Web App. Installable from the browser. No app store required.</tspan></text>
</svg>
