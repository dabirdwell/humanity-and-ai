<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 500" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="phoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f" />
      <stop offset="100%" style="stop-color:#12121a" />
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35" />
      <stop offset="100%" style="stop-color:#e55a2b" />
    </linearGradient>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ff6b35" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="480" rx="28" fill="url(#phoneBg)" stroke="#2a2a3a" stroke-width="2"/>

  <!-- Status bar -->
  <text x="30" y="42" fill="#9898a8" font-size="11">9:41</text>
  <circle cx="220" cy="38" r="3" fill="#4ecdc4"/>
  <rect x="232" y="34" width="20" height="8" rx="2" fill="#9898a8" opacity="0.5"/>
  <rect x="233" y="35" width="14" height="6" rx="1" fill="#4ecdc4"/>

  <!-- Header -->
  <text x="140" y="80" text-anchor="middle" fill="#e8e8ed" font-size="18" font-weight="600">BEACON</text>
  <text x="140" y="98" text-anchor="middle" fill="#9898a8" font-size="11">Civic Live Streaming</text>

  <!-- Camera preview area -->
  <rect x="30" y="115" width="220" height="165" rx="10" fill="#16161f" stroke="#2a2a3a" stroke-width="1"/>
  <text x="140" y="195" text-anchor="middle" fill="#68687a" font-size="12">Camera Preview</text>
  <text x="140" y="215" text-anchor="middle" fill="#68687a" font-size="28">📷</text>

  <!-- Camera toggle button -->
  <rect x="195" y="125" width="45" height="30" rx="6" fill="#1e1e2e" stroke="#4ecdc4" stroke-width="1"/>
  <text x="217" y="145" text-anchor="middle" fill="#4ecdc4" font-size="14">🔄</text>

  <!-- GO LIVE button -->
  <circle cx="140" cy="355" r="55" fill="url(#btnGrad)" filter="url(#btnShadow)"/>
  <circle cx="140" cy="355" r="50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <text x="140" y="349" text-anchor="middle" fill="white" font-size="13" font-weight="700" letter-spacing="0.1em">GO</text>
  <text x="140" y="367" text-anchor="middle" fill="white" font-size="13" font-weight="700" letter-spacing="0.1em">LIVE</text>

  <!-- Status indicator -->
  <circle cx="140" cy="430" r="5" fill="#68687a"/>
  <text x="140" y="452" text-anchor="middle" fill="#68687a" font-size="10">Ready</text>

  <!-- Bottom bar -->
  <line x1="90" y1="475" x2="190" y2="475" stroke="#9898a8" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
</svg>
