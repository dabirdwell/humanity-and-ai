<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 500" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="phoneBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f" />
      <stop offset="100%" style="stop-color:#12121a" />
    </linearGradient>
    <linearGradient id="stopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626" />
      <stop offset="100%" style="stop-color:#b91c1c" />
    </linearGradient>
    <filter id="stopShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#dc2626" flood-opacity="0.4"/>
    </filter>
    <!-- Pulse animation -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .live-dot { animation: pulse 1.5s ease-in-out infinite; }
      @keyframes ring {
        0% { r: 55; opacity: 0.3; }
        100% { r: 70; opacity: 0; }
      }
      .pulse-ring { animation: ring 2s ease-out infinite; }
    </style>
  </defs>

  <!-- Phone frame -->
  <rect x="10" y="10" width="260" height="480" rx="28" fill="url(#phoneBg2)" stroke="#dc2626" stroke-width="2" opacity="1"/>

  <!-- Status bar -->
  <text x="30" y="42" fill="#9898a8" font-size="11">9:41</text>
  <circle cx="220" cy="38" r="3" fill="#4ecdc4"/>
  <rect x="232" y="34" width="20" height="8" rx="2" fill="#9898a8" opacity="0.5"/>
  <rect x="233" y="35" width="14" height="6" rx="1" fill="#4ecdc4"/>

  <!-- Header -->
  <text x="140" y="80" text-anchor="middle" fill="#e8e8ed" font-size="18" font-weight="600">BEACON</text>

  <!-- LIVE indicator -->
  <rect x="95" y="86" width="50" height="20" rx="4" fill="#dc2626"/>
  <circle cx="108" cy="96" r="3" fill="white" class="live-dot"/>
  <text x="130" y="100" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.05em">LIVE</text>

  <!-- Camera preview area (active - simulated video) -->
  <rect x="30" y="115" width="220" height="165" rx="10" fill="#1a1a2e" stroke="#dc2626" stroke-width="1"/>
  <!-- Simulated scene -->
  <rect x="40" y="125" width="200" height="145" rx="6" fill="#0d1117"/>
  <rect x="60" y="155" width="40" height="60" rx="4" fill="#2a2a3a"/>
  <rect x="120" y="145" width="50" height="70" rx="4" fill="#2a2a3a"/>
  <rect x="190" y="160" width="35" height="55" rx="4" fill="#2a2a3a"/>
  <rect x="40" y="245" width="200" height="25" rx="0" fill="#16161f"/>
  <text x="140" y="262" text-anchor="middle" fill="#68687a" font-size="9">Council Chamber — Live Feed</text>

  <!-- Camera toggle button -->
  <rect x="195" y="125" width="45" height="30" rx="6" fill="#1e1e2e" stroke="#4ecdc4" stroke-width="1"/>
  <text x="217" y="145" text-anchor="middle" fill="#4ecdc4" font-size="14">🔄</text>

  <!-- Timer -->
  <text x="50" y="137" fill="#dc2626" font-size="10" font-weight="600">● 04:32</text>

  <!-- STOP button with pulse ring -->
  <circle cx="140" cy="355" r="55" fill="none" stroke="#dc2626" stroke-width="1.5" class="pulse-ring"/>
  <circle cx="140" cy="355" r="55" fill="url(#stopGrad)" filter="url(#stopShadow)"/>
  <circle cx="140" cy="355" r="50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <rect x="122" y="340" width="36" height="30" rx="4" fill="white"/>

  <!-- Status indicator -->
  <circle cx="125" cy="430" r="5" fill="#dc2626" class="live-dot"/>
  <text x="150" y="434" fill="#dc2626" font-size="10" font-weight="500">Broadcasting</text>

  <!-- Viewer count -->
  <text x="140" y="455" text-anchor="middle" fill="#9898a8" font-size="10">👁️ 23 viewers</text>

  <!-- Bottom bar -->
  <line x1="90" y1="475" x2="190" y2="475" stroke="#9898a8" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
</svg>
