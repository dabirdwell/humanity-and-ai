<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Parallel execution bars (like a Gantt chart) -->
  <g transform="translate(80, 120)">
    <rect x="0" y="0" width="340" height="8" rx="4" fill="url(#bar)"/>
    <rect x="60" y="30" width="280" height="8" rx="4" fill="url(#bar)"/>
    <rect x="20" y="60" width="360" height="8" rx="4" fill="url(#bar)"/>
    <rect x="80" y="90" width="240" height="8" rx="4" fill="url(#bar)"/>
    <rect x="10" y="120" width="320" height="8" rx="4" fill="url(#bar)"/>
    <rect x="100" y="150" width="260" height="8" rx="4" fill="url(#bar)"/>
    <rect x="40" y="180" width="300" height="8" rx="4" fill="url(#bar)"/>
    <rect x="0" y="210" width="380" height="8" rx="4" fill="url(#bar)"/>
    <rect x="70" y="240" width="290" height="8" rx="4" fill="url(#bar)"/>
    <rect x="30" y="270" width="330" height="8" rx="4" fill="url(#bar)"/>
    <rect x="90" y="300" width="270" height="8" rx="4" fill="url(#bar)"/>
    <rect x="50" y="330" width="310" height="8" rx="4" fill="url(#bar)"/>
  </g>
  <!-- Checkmarks at the end of some bars -->
  <g fill="#4ecdc4" opacity="0.3" font-family="system-ui, sans-serif" font-size="14">
    <text x="430" y="132">&#x2713;</text>
    <text x="390" y="192">&#x2713;</text>
    <text x="470" y="222">&#x2713;</text>
    <text x="350" y="252">&#x2713;</text>
    <text x="410" y="282">&#x2713;</text>
    <text x="390" y="342">&#x2713;</text>
    <text x="460" y="342">&#x2713;</text>
  </g>
  <text font-family="system-ui, -apple-system, sans-serif" fill="#e8e8ed" text-anchor="start">
    <tspan x="560" y="270" font-size="48" font-weight="700">The Sprint</tspan>
    <tspan x="560" y="330" font-size="48" font-weight="700">Marathon Method</tspan>
  </text>
  <line x1="560" y1="355" x2="1000" y2="355" stroke="#4ecdc4" stroke-width="2" opacity="0.3"/>
  <text x="560" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9898a8">HUMANITY &amp; AI</text>
</svg>