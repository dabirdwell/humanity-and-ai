<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 16 circles in a 4x4 grid representing 16 essays -->
  <g transform="translate(150, 180)" opacity="0.15">
    <circle cx="0" cy="0" r="18" fill="#4ecdc4"/>
    <circle cx="60" cy="0" r="18" fill="#4ecdc4"/>
    <circle cx="120" cy="0" r="18" fill="#4ecdc4"/>
    <circle cx="180" cy="0" r="18" fill="#4ecdc4"/>
    <circle cx="0" cy="60" r="18" fill="#4ecdc4"/>
    <circle cx="60" cy="60" r="18" fill="#4ecdc4"/>
    <circle cx="120" cy="60" r="18" fill="#4ecdc4"/>
    <circle cx="180" cy="60" r="18" fill="#4ecdc4"/>
    <circle cx="0" cy="120" r="18" fill="#4ecdc4"/>
    <circle cx="60" cy="120" r="18" fill="#4ecdc4"/>
    <circle cx="120" cy="120" r="18" fill="#4ecdc4"/>
    <circle cx="180" cy="120" r="18" fill="#4ecdc4"/>
    <circle cx="0" cy="180" r="18" fill="#4ecdc4"/>
    <circle cx="60" cy="180" r="18" fill="#4ecdc4"/>
    <circle cx="120" cy="180" r="18" fill="#4ecdc4"/>
    <circle cx="180" cy="180" r="18" fill="#4ecdc4"/>
  </g>
  <!-- Converging lines from grid to right side -->
  <g opacity="0.1" stroke="#4ecdc4" stroke-width="1">
    <line x1="348" y1="180" x2="520" y2="315"/>
    <line x1="348" y1="240" x2="520" y2="315"/>
    <line x1="348" y1="300" x2="520" y2="315"/>
    <line x1="348" y1="360" x2="520" y2="315"/>
  </g>
  <!-- Single large circle = one voice -->
  <circle cx="560" cy="315" r="40" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.25"/>
  <text x="600" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#e8e8ed" text-anchor="middle" dominant-baseline="middle" transform="translate(0,0)">
    <tspan x="750" dy="0">All Sixteen,</tspan>
    <tspan x="750" dy="64">In One Voice</tspan>
  </text>
  <line x1="650" y1="370" x2="850" y2="370" stroke="#4ecdc4" stroke-width="2" opacity="0.4"/>
  <text x="750" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9898a8" text-anchor="middle">HUMANITY &amp; AI</text>
</svg>