<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ascending revenue line -->
  <polyline points="100,480 300,470 500,450 700,400 850,300 950,200" fill="none" stroke="url(#line-grad)" stroke-width="3"/>
  <!-- Endpoint glow -->
  <circle cx="950" cy="200" r="6" fill="#fbbf24" opacity="0.6"/>
  <circle cx="950" cy="200" r="20" fill="#fbbf24" opacity="0.08"/>
  <!-- Baseline -->
  <line x1="100" y1="500" x2="1100" y2="500" stroke="#9898a8" stroke-width="0.5" opacity="0.1"/>
  <text font-family="system-ui, -apple-system, sans-serif" fill="#e8e8ed" text-anchor="middle">
    <tspan x="600" y="280" font-size="64" font-weight="700">First Revenue</tspan>
    <tspan x="600" y="330" font-size="24" fill="#fbbf24" opacity="0.7">$4.99/month</tspan>
  </text>
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fbbf24" stroke-width="2" opacity="0.25"/>
  <text x="600" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9898a8" text-anchor="middle">HUMANITY &amp; AI</text>
</svg>