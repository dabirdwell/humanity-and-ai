<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid of 40 dots representing sprints -->
  <g transform="translate(80, 140)">
    <g opacity="0.25" fill="#c084fc">
      <circle cx="0" cy="0" r="5"/><circle cx="40" cy="0" r="5"/><circle cx="80" cy="0" r="5"/><circle cx="120" cy="0" r="5"/><circle cx="160" cy="0" r="5"/><circle cx="200" cy="0" r="5"/><circle cx="240" cy="0" r="5"/><circle cx="280" cy="0" r="5"/>
      <circle cx="0" cy="40" r="5"/><circle cx="40" cy="40" r="5"/><circle cx="80" cy="40" r="5"/><circle cx="120" cy="40" r="5"/><circle cx="160" cy="40" r="5"/><circle cx="200" cy="40" r="5"/><circle cx="240" cy="40" r="5"/><circle cx="280" cy="40" r="5"/>
      <circle cx="0" cy="80" r="5"/><circle cx="40" cy="80" r="5"/><circle cx="80" cy="80" r="5"/><circle cx="120" cy="80" r="5"/><circle cx="160" cy="80" r="5"/><circle cx="200" cy="80" r="5"/><circle cx="240" cy="80" r="5"/><circle cx="280" cy="80" r="5"/>
      <circle cx="0" cy="120" r="5"/><circle cx="40" cy="120" r="5"/><circle cx="80" cy="120" r="5"/><circle cx="120" cy="120" r="5"/><circle cx="160" cy="120" r="5"/><circle cx="200" cy="120" r="5"/><circle cx="240" cy="120" r="5"/><circle cx="280" cy="120" r="5"/>
      <circle cx="0" cy="160" r="5"/><circle cx="40" cy="160" r="5"/><circle cx="80" cy="160" r="5"/><circle cx="120" cy="160" r="5"/><circle cx="160" cy="160" r="5"/><circle cx="200" cy="160" r="5"/><circle cx="240" cy="160" r="5"/><circle cx="280" cy="160" r="5"/>
    </g>
    <!-- Some dots highlighted brighter -->
    <g opacity="0.6" fill="#c084fc">
      <circle cx="0" cy="0" r="5"/><circle cx="80" cy="0" r="5"/><circle cx="200" cy="0" r="5"/>
      <circle cx="40" cy="40" r="5"/><circle cx="160" cy="40" r="5"/><circle cx="280" cy="40" r="5"/>
      <circle cx="120" cy="80" r="5"/><circle cx="240" cy="80" r="5"/>
      <circle cx="0" cy="120" r="5"/><circle cx="80" cy="120" r="5"/>
    </g>
  </g>
  <text font-family="system-ui, -apple-system, sans-serif" fill="#e8e8ed" text-anchor="start">
    <tspan x="480" y="240" font-size="48" font-weight="700">What Forty Sprints</tspan>
    <tspan x="480" y="300" font-size="48" font-weight="700">in One Night</tspan>
    <tspan x="480" y="360" font-size="48" font-weight="700">Looks Like</tspan>
  </text>
  <line x1="480" y1="385" x2="900" y2="385" stroke="#c084fc" stroke-width="2" opacity="0.3"/>
  <text x="480" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9898a8">HUMANITY &amp; AI</text>
</svg>