        name: "ae_index"
        file: "content/ae/_index.md"
        preview_path: "preview/ae/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Beacon (landing)"
        name: "beacon_index"
        file: "content/beacon/_index.md"
        preview_path: "preview/beacon/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Brain Mastery (landing)"
        name: "brain_mastery_index"
        file: "content/brain-mastery/_index.md"
        preview_path: "preview/brain-mastery/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Foundation (landing)"
        name: "foundation_index"
        file: "content/foundation/_index.md"
        preview_path: "preview/foundation/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Hype Index (landing)"
        name: "hype_index_index"
        file: "content/hype-index/index.md"
        preview_path: "preview/hype-index/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
