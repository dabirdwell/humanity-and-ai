# =============================================================
# Humanity and AI — Sveltia CMS configuration
# Editor: https://humanityandai.com/admin/
# Preview (drafts visible): https://humanityandai.com/preview/
#
# Scheduled publishing: any entry with a future `publishDate` is
# treated by Hugo as not-yet-published — it won't render in the
# live build. The /preview/ build uses --buildFuture so future-dated
# entries are visible there. A daily 11:00 UTC (6 AM CT) cron job in
# .github/workflows/hugo.yml rebuilds the site so scheduled posts
# go live automatically.
# =============================================================

backend:
  name: github
  repo: dabirdwell/humanity-and-ai
  branch: main
  base_url: https://sveltia-cms-auth.davidbirdwell.workers.dev
  # Sveltia opens a fresh OAuth window per session — keep this short list
  auth_scope: repo
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'
    uploadMedia: 'CMS: upload "{{path}}"'
    deleteMedia: 'CMS: delete media "{{path}}"'

# Public-facing site & draft-preview URLs (Sveltia uses these for header links)
site_url: https://humanityandai.com
display_url: https://humanityandai.com
logo_url: https://humanityandai.com/favicon.svg

# Show "View" links next to entries that point at the live preview path.
# Every preview_path uses the /preview/ prefix so drafts and future-dated
# entries always resolve in the preview build.
show_preview_links: true

media_folder: static/images
public_folder: /images

# Sveltia-specific media library tuning
media_libraries:
  default:
    config:
      max_file_size: 5_000_000   # 5 MB hard cap to keep the repo lean

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:

  # ─────────────────────────────────────────────────────────
  # PAGES — Top-level marketing pages
  # ─────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    description: Top-level pages (About, Sanctuary, etc.)
    delete: false
    editor:
      preview: false
    files:
      - label: "About"
        name: "about"
        file: "content/about.md"
        preview_path: "preview/about/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "single" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
          - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Sanctuary"
        name: "sanctuary"
        file: "content/sanctuary.md"
        preview_path: "preview/sanctuary/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
          - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "TasteBud"
        name: "tastebud"
        file: "content/tastebud.md"
        preview_path: "preview/tastebud/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
          - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Subscribe"
        name: "subscribe"
        file: "content/subscribe.md"
        preview_path: "preview/subscribe/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Pattern"
        name: "pattern"
        file: "content/pattern.md"
        preview_path: "preview/pattern/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
          - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # SECTION LANDINGS — the _index.md for each section
  # ─────────────────────────────────────────────────────────
  - name: section_landings
    label: Section Landing Pages
    label_singular: Section Landing
    description: The _index.md page that fronts each section.
    delete: false
    files:
