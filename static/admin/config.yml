      - label: "The Inference (landing)"
        name: "inference_index"
        file: "content/inference/_index.md"
        preview_path: "preview/inference/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Legislation (landing)"
        name: "legislation_index"
        file: "content/legislation/_index.md"
        preview_path: "preview/legislation/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Layout", name: "layout", widget: "hidden", default: "list" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Phoenix Wells (landing)"
        name: "phoenix_wells_index"
        file: "content/phoenix-wells/_index.md"
        preview_path: "preview/phoenix-wells/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Products (landing)"
        name: "products_index"
        file: "content/products/_index.md"
        preview_path: "preview/products/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Report (landing)"
        name: "report_index"
        file: "content/report/_index.md"
        preview_path: "preview/report/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Research (landing)"
        name: "research_index"
        file: "content/research/_index.md"
        preview_path: "preview/research/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "single" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Show (landing)"
        name: "show_index"
        file: "content/show/_index.md"
        preview_path: "preview/show/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Stream (landing)"
        name: "stream_index"
        file: "content/stream/_index.md"
        preview_path: "preview/stream/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Visualizations (landing)"
        name: "viz_index"
        file: "content/visualizations/_index.md"
        preview_path: "preview/visualizations/"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # STREAM POSTS
  # ─────────────────────────────────────────────────────────
  # Creation templates (the editor picks one via the Type field on create):
  #   • Blog Post     — type: insight,  standard post with title, date, tags, body
  #   • Policy Brief  — type: policy,   adds related_essays
  #   • Research Note — type: research, adds related_essays
  #   • Quick Take    — type: insight,  shorter format, no related_essays needed
  - name: stream
    label: Stream Posts
    description: Blog posts, dispatches, daily updates.
    folder: content/stream
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{draft | ternary('DRAFT','LIVE')}} — {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title", "draft", "type"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
      - { label: "Type: Policy", field: type, pattern: policy }
      - { label: "Type: Research", field: type, pattern: research }
      - { label: "Type: Insight", field: type, pattern: insight }
    view_groups:
      - { label: Status, field: draft }
      - { label: Type, field: type }
      - { label: Year, field: date, pattern: '\d{4}' }
    # Sveltia/Decap surfaces these as "Create from template" options when supported.
    templates:
      - name: blog_post
        label: "Blog Post"
        fields:
          - { name: "type", default: "insight" }
      - name: policy_brief
        label: "Policy Brief"
        fields:
          - { name: "type", default: "policy" }
      - name: research_note
        label: "Research Note"
        fields:
          - { name: "type", default: "research" }
      - name: quick_take
        label: "Quick Take"
        fields:
          - { name: "type", default: "insight" }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      # publishDate: Hugo natively respects this — entries with a future
      # publishDate are excluded from the live build until that moment.
      - { label: "Publish Date (scheduled)", name: "publishDate", widget: "datetime", required: false, hint: "Future date = post stays hidden on the live site until then. Daily 11:00 UTC cron republishes the site." }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["policy", "research", "insight", "futurism", "tool", "community", "letter"]
        default: "insight"
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Related", name: "related", widget: "list", required: false }
      - label: "Related Essays"
        name: "related_essays"
        widget: "relation"
        collection: "foundation"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        multiple: true
        required: false
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # FOUNDATION ESSAYS — locked to 16, full field set
  # ─────────────────────────────────────────────────────────
  - name: foundation
    label: Foundation Essays
    description: The 16 essays. Locked — no creating or deleting.
    folder: content/foundation
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: false
    delete: false
    slug: "{{slug}}"
    summary: "{{title}} — {{status}} — {{draft | ternary('DRAFT','LIVE')}}"
    sortable_fields: ["weight", "title", "status", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
      - { label: "Status: Seed", field: status, pattern: seed }
      - { label: "Status: Growing", field: status, pattern: growing }
      - { label: "Status: Mature", field: status, pattern: mature }
    view_groups:
      - { label: Status, field: status }
      - { label: Draft, field: draft }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Number", name: "number", widget: "string", required: false }
      - { label: "Weight", name: "weight", widget: "number", required: false, value_type: "int" }
      - { label: "Status", name: "status", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      # publishDate: Hugo natively respects this — future-dated essays
      # stay hidden on the live site until the daily cron republishes.
      - { label: "Publish Date (scheduled)", name: "publishDate", widget: "datetime", required: false, hint: "Future date = essay stays hidden on the live site until then." }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Related", name: "related", widget: "list", required: false }
      - label: "Related Posts"
        name: "related_posts"
        widget: "relation"
        collection: "stream"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        multiple: true
        required: false
      - { label: "Hero stat", name: "hero_stat", widget: "text", required: false }
      - { label: "Hero stat bridge", name: "hero_stat_bridge", widget: "text", required: false }
      - { label: "Hero stat source", name: "hero_stat_source", widget: "text", required: false }
      - { label: "Aliases", name: "aliases", widget: "list", required: false }
      - { label: "Discussion URL", name: "discussion_url", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # THE INFERENCE — issue archive
  # ─────────────────────────────────────────────────────────
  # Creation template: the field defaults below pre-fill the standard issue structure
  # (draft on, empty lede, empty tags, empty body) so a new issue starts ready-to-fill.
  - name: inference
    label: The Inference
    description: Issues of The Inference newsletter.
    folder: content/inference
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "issue-{{issue}}"
    summary: "Issue {{issue}}: {{title}} — {{draft | ternary('DRAFT','LIVE')}}"
    sortable_fields: ["issue", "date", "title", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Status, field: draft }
    templates:
      - name: standard_issue
        label: "Standard Issue"
        fields:
          - { name: "draft", default: true }
          - { name: "lede", default: "" }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Issue number", name: "issue", widget: "number", value_type: "int" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      # publishDate: Hugo natively respects this — future-dated issues
      # stay hidden until the daily cron republishes the site.
      - { label: "Publish Date (scheduled)", name: "publishDate", widget: "datetime", required: false, hint: "Future date = issue stays hidden on the live site until then." }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Lede", name: "lede", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - label: "Related Issues"
        name: "related_issues"
        widget: "relation"
        collection: "inference"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        multiple: true
        required: false
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # LEGISLATIVE REPORT — older issue archive
  # ─────────────────────────────────────────────────────────
  - name: report
    label: LegislAItive Report
    description: The LegislAItive Report archive.
    folder: content/report
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{draft | ternary('DRAFT','LIVE')}}"
    sortable_fields: ["issue", "date", "title", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Status, field: draft }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Issue number", name: "issue", widget: "number", value_type: "int", required: false }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Lede", name: "lede", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Window status", name: "window_status", widget: "string", required: false }
      - { label: "Subscribe URL", name: "subscribe_url", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # VISUALIZATIONS — interactive pages
  # ─────────────────────────────────────────────────────────
  - name: visualizations
    label: Visualizations
    description: Interactive visualizations and data essays.
    folder: content/visualizations
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{draft | ternary('DRAFT','LIVE')}}"
    sortable_fields: ["date", "title", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Status, field: draft }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Type", name: "type", widget: "hidden", default: "visualizations" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Preview background", name: "preview_bg", widget: "string", required: false }
      - { label: "Preview icon", name: "preview_icon", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # SHOW EPISODES
  # ─────────────────────────────────────────────────────────
  - name: show
    label: Show Episodes
    description: The Humanity and AI Show — episodes and format pages.
    folder: content/show
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{status}} — {{draft | ternary('DRAFT','LIVE')}}"
    sortable_fields: ["weight", "date", "title", "status", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Status, field: status }
      - { label: Draft, field: draft }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      # publishDate: Hugo natively respects this — future-dated episodes
      # stay hidden until the daily cron republishes the site.
      - { label: "Publish Date (scheduled)", name: "publishDate", widget: "datetime", required: false, hint: "Future date = episode stays hidden on the live site until then." }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Weight", name: "weight", widget: "number", value_type: "int", required: false }
      - { label: "Status", name: "status", widget: "string", required: false }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # Æ CREATIVE — Æ-attributed pieces
  # ─────────────────────────────────────────────────────────
  - name: ae
    label: "Æ Creative"
    description: Pieces attributed to Æ.
    folder: content/ae
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{draft | ternary('DRAFT','LIVE')}} — {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Status, field: draft }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      # publishDate: Hugo natively respects this — future-dated pieces
      # stay hidden until the daily cron republishes the site.
      - { label: "Publish Date (scheduled)", name: "publishDate", widget: "datetime", required: false, hint: "Future date = piece stays hidden on the live site until then." }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Layout", name: "layout", widget: "string", required: false, default: "single" }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─────────────────────────────────────────────────────────
  # PRODUCTS
  # ─────────────────────────────────────────────────────────
  - name: products
    label: Products
    description: The product catalogue (Beacon, Citizen, Clarity, …).
    folder: content/products
    preview_path: "preview/{{collection}}/{{slug}}/"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{status}} — {{draft | ternary('DRAFT','LIVE')}}"
    sortable_fields: ["weight", "status", "title", "draft"]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Status, field: status }
      - { label: Draft, field: draft }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Keep under 160 characters for search engines" }
      - { label: "Social Image", name: "og_image", widget: "image", required: false, hint: "1200x630 recommended" }
      - { label: "Tagline", name: "tagline", widget: "string", required: false }
      - { label: "Weight", name: "weight", widget: "number", value_type: "int", required: false }
      - { label: "Status", name: "status", widget: "string", required: false }
      - { label: "Domain", name: "domain", widget: "string", required: false }
      - { label: "Icon", name: "icon", widget: "string", required: false }
      - { label: "Link", name: "link", widget: "string", required: false }
      - { label: "Link text", name: "link_text", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
