name: Staging Build Verification

on:
  push:
    branches: ["staging"]

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.145.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: staging
          TZ: America/Chicago
        run: hugo --gc --minify

      - name: Verify build output
        run: |
          if [ ! -d "public" ] || [ -z "$(ls -A public)" ]; then
            echo "::error::Build produced no output in public/"
            exit 1
          fi
          FILE_COUNT=$(find public -type f | wc -l | tr -d ' ')
          echo "Staging build succeeded — ${FILE_COUNT} files generated"
          echo "### Staging Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Files generated:** ${FILE_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Hugo version:** ${HUGO_VERSION}" >> $GITHUB_STEP_SUMMARY
